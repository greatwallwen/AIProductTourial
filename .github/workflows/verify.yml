name: verify

on:
  push:
  pull_request:

jobs:
  projects:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [01-gov-approval, 02-contract-ledger, 03-device-monitor, 04-saas-ticket]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: verify ${{ matrix.project }}
        working-directory: code/${{ matrix.project }}
        run: |
          npm ci
          npm run verify

  style-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: 文风检查（出版级）
        run: node scripts/style-lint.mjs --tighten=4
      - name: 单文件版可重新生成
        run: node scripts/build-single-md.mjs
