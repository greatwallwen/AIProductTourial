<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">
  <desc>C4 L3 组件图：ingest 进程内部——MQTT 订阅、校验、幂等写入、增量聚合、内存告警匹配五个组件，前四步在同一写事务内串行，告警规则常驻内存。只画这一个有争议的局部，其余容器的 L3 交给目录结构。</desc>
  <defs>
    <marker id="l3arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#555"/>
    </marker>
  </defs>

  <text x="40" y="44" font-size="20" font-weight="700" fill="#1a1a1a">C4 · L3 组件图：ingest 进程内部（唯一展开的有争议局部）</text>
  <text x="40" y="70" font-size="13" fill="#666">C4 只对"有争议、要评审"的容器画到组件层（1.4 §5）。写路径的幂等与告警评估同处一个事务，值得一张图；其余容器的 L3 交给目录结构</text>

  <!-- 外部：EMQX -->
  <rect x="40" y="270" width="150" height="90" rx="10" fill="#999999"/>
  <text x="115" y="308" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">EMQX</text>
  <text x="115" y="330" font-size="10" fill="#eee" text-anchor="middle">[容器] MQTT Broker</text>
  <text x="115" y="348" font-size="10" fill="#eee" text-anchor="middle">QoS 1</text>

  <!-- ingest 进程边界 -->
  <rect x="230" y="120" width="720" height="440" rx="12" fill="none" stroke="#444" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="248" y="146" font-size="13" font-weight="600" fill="#444">ingest 进程 [容器：Node.js]</text>

  <!-- 组件1：订阅 -->
  <rect x="256" y="270" width="150" height="90" rx="8" fill="#85bbf0"/>
  <text x="331" y="304" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">MQTT 订阅</text>
  <text x="331" y="326" font-size="10" fill="#333" text-anchor="middle">共享订阅组</text>
  <text x="331" y="344" font-size="10" fill="#333" text-anchor="middle">解出遥测点</text>

  <!-- 事务边界框，包住 校验/幂等写入/聚合/告警 -->
  <rect x="430" y="180" width="490" height="300" rx="10" fill="#eef3f8" stroke="#1168bd" stroke-width="1.6"/>
  <text x="450" y="204" font-size="12" font-weight="600" fill="#1168bd">单写事务（全部成功或整批回滚）</text>

  <!-- 组件2：校验 -->
  <rect x="450" y="220" width="200" height="66" rx="8" fill="#85bbf0"/>
  <text x="550" y="248" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">① 校验</text>
  <text x="550" y="268" font-size="10" fill="#333" text-anchor="middle">设备存在性·时间戳·量纲</text>

  <!-- 组件3：幂等写入 -->
  <rect x="450" y="300" width="200" height="66" rx="8" fill="#85bbf0"/>
  <text x="550" y="328" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">② 幂等写入 raw</text>
  <text x="550" y="348" font-size="10" fill="#333" text-anchor="middle">INSERT OR IGNORE，重复跳过</text>

  <!-- 组件4：增量聚合 -->
  <rect x="700" y="220" width="200" height="66" rx="8" fill="#85bbf0"/>
  <text x="800" y="248" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">③ 增量聚合 hourly</text>
  <text x="800" y="268" font-size="10" fill="#333" text-anchor="middle">UPSERT cnt/sum/min/max</text>

  <!-- 组件5：告警匹配 -->
  <rect x="700" y="300" width="200" height="66" rx="8" fill="#85bbf0"/>
  <text x="800" y="328" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">④ 内存告警匹配</text>
  <text x="800" y="348" font-size="10" fill="#333" text-anchor="middle">规则常驻内存·状态机迁移</text>

  <!-- 规则缓存（内存） -->
  <rect x="700" y="400" width="200" height="58" rx="8" fill="#f0f7f0" stroke="#2e7d32" stroke-width="1.4"/>
  <text x="800" y="424" font-size="12" font-weight="600" fill="#2e7d32" text-anchor="middle">告警规则缓存（内存）</text>
  <text x="800" y="442" font-size="10" fill="#555" text-anchor="middle">启动加载·规则变更时重载</text>

  <!-- 数据库 -->
  <g>
    <ellipse cx="1075" cy="250" rx="95" ry="12" fill="#438dd5"/>
    <rect x="980" y="250" width="190" height="80" fill="#438dd5"/>
    <ellipse cx="1075" cy="330" rx="95" ry="12" fill="#438dd5"/>
    <text x="1075" y="286" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">TimescaleDB</text>
    <text x="1075" y="306" font-size="10" fill="#e8f1fa" text-anchor="middle">raw · hourly · alerts</text>
  </g>

  <!-- 连线 -->
  <line x1="190" y1="315" x2="252" y2="315" stroke="#555" stroke-width="1.8" marker-end="url(#l3arr)"/>
  <text x="221" y="305" font-size="10" fill="#555" text-anchor="middle">≈400/s</text>
  <line x1="406" y1="300" x2="446" y2="253" stroke="#555" stroke-width="1.6" marker-end="url(#l3arr)"/>
  <line x1="550" y1="286" x2="550" y2="296" stroke="#555" stroke-width="1.6" marker-end="url(#l3arr)"/>
  <line x1="650" y1="253" x2="696" y2="253" stroke="#555" stroke-width="1.6" marker-end="url(#l3arr)"/>
  <text x="673" y="243" font-size="9" fill="#555" text-anchor="middle">新点</text>
  <line x1="650" y1="333" x2="696" y2="333" stroke="#555" stroke-width="1.6" marker-end="url(#l3arr)"/>
  <text x="673" y="323" font-size="9" fill="#555" text-anchor="middle">新点</text>
  <line x1="800" y1="366" x2="800" y2="396" stroke="#2e7d32" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#l3arr)"/>
  <text x="838" y="386" font-size="9" fill="#2e7d32" text-anchor="middle">查规则</text>
  <path d="M 650 333 L 660 333 L 660 490 L 975 490 L 975 340" fill="none" stroke="#555" stroke-width="1.4" marker-end="url(#l3arr)"/>
  <path d="M 900 253 L 978 265" fill="none" stroke="#555" stroke-width="1.4" marker-end="url(#l3arr)"/>
  <path d="M 900 333 L 978 315" fill="none" stroke="#555" stroke-width="1.4" marker-end="url(#l3arr)"/>
  <text x="940" y="470" font-size="10" fill="#555" text-anchor="middle">COMMIT 一次落库</text>

  <!-- 说明 -->
  <text x="450" y="520" font-size="11.5" fill="#555">四步同事务：任一步失败整批回滚（未注册设备 → 整批 404），不会出现"raw 写了但聚合没更"的中间态。</text>

  <!-- 图例 -->
  <g>
    <rect x="640" y="588" width="26" height="16" rx="4" fill="#85bbf0"/>
    <text x="674" y="600" font-size="11" fill="#555">组件</text>
    <rect x="736" y="588" width="26" height="16" rx="4" fill="#438dd5"/>
    <text x="770" y="600" font-size="11" fill="#555">容器</text>
    <rect x="824" y="588" width="26" height="16" rx="4" fill="#999999"/>
    <text x="858" y="600" font-size="11" fill="#555">外部</text>
    <rect x="906" y="588" width="26" height="16" rx="4" fill="#eef3f8" stroke="#1168bd" stroke-width="1.6"/>
    <text x="940" y="600" font-size="11" fill="#555">事务边界</text>
  </g>
</svg>
