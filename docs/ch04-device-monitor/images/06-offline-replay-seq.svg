<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">
  <desc>断网续传时序图：正常期网关实时上报；断网期网关本地缓存落盘；恢复期 MQTT QoS1 按序补传，平台幂等去重，最终库中无缺口无重复。</desc>
  <defs>
    <marker id="ofarr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#555"/>
    </marker>
  </defs>

  <text x="40" y="44" font-size="20" font-weight="700" fill="#1a1a1a">断网续传：三个环节各自成立，合起来兑现 Q-05</text>
  <text x="40" y="70" font-size="13" fill="#666">网关缓存（C-03 的解）＋ QoS 1 重发（协议语义）＋ 平台幂等（duplicates 跳过）＝ 无缺口、无重复</text>

  <!-- 生命线头 -->
  <g>
    <rect x="70" y="100" width="150" height="50" rx="8" fill="#999999"/>
    <text x="145" y="130" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">设备（持续产数）</text>
    <rect x="320" y="100" width="150" height="50" rx="8" fill="#999999"/>
    <text x="395" y="124" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">车间网关</text>
    <text x="395" y="142" font-size="10" fill="#eee" text-anchor="middle">本地缓存</text>
    <rect x="570" y="100" width="150" height="50" rx="8" fill="#438dd5"/>
    <text x="645" y="130" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">EMQX</text>
    <rect x="820" y="100" width="150" height="50" rx="8" fill="#438dd5"/>
    <text x="895" y="124" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">ingest</text>
    <text x="895" y="142" font-size="10" fill="#e8f1fa" text-anchor="middle">幂等写入</text>
    <rect x="1030" y="100" width="130" height="50" rx="8" fill="#438dd5"/>
    <text x="1095" y="130" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">TimescaleDB</text>
  </g>
  <g stroke="#b8c2cb" stroke-width="1.2" stroke-dasharray="4 4">
    <line x1="145" y1="150" x2="145" y2="670"/>
    <line x1="395" y1="150" x2="395" y2="670"/>
    <line x1="645" y1="150" x2="645" y2="670"/>
    <line x1="895" y1="150" x2="895" y2="670"/>
    <line x1="1095" y1="150" x2="1095" y2="670"/>
  </g>

  <!-- 阶段1 正常 -->
  <rect x="55" y="180" width="1105" height="90" fill="#f0f7f0" opacity="0.5"/>
  <text x="70" y="200" font-size="11" font-weight="600" fill="#2e7d32">正常期</text>
  <line x1="145" y1="222" x2="391" y2="222" stroke="#555" stroke-width="1.5" marker-end="url(#ofarr)"/>
  <text x="268" y="212" font-size="11" fill="#333" text-anchor="middle">Modbus 采集（每 5s）</text>
  <line x1="395" y1="248" x2="641" y2="248" stroke="#555" stroke-width="1.5" marker-end="url(#ofarr)"/>
  <text x="518" y="238" font-size="11" fill="#333" text-anchor="middle">MQTT PUBLISH（QoS 1，实时）</text>
  <line x1="645" y1="248" x2="891" y2="248" stroke="#555" stroke-width="1.5" marker-end="url(#ofarr)"/>
  <line x1="895" y1="248" x2="1091" y2="248" stroke="#555" stroke-width="1.5" marker-end="url(#ofarr)"/>
  <text x="993" y="238" font-size="11" fill="#333" text-anchor="middle">inserted</text>

  <!-- 阶段2 断网 -->
  <rect x="55" y="290" width="1105" height="130" fill="#fdf0f0" opacity="0.5"/>
  <text x="70" y="310" font-size="11" font-weight="600" fill="#c62828">断网期（如 2 小时）</text>
  <line x1="145" y1="336" x2="391" y2="336" stroke="#555" stroke-width="1.5" marker-end="url(#ofarr)"/>
  <text x="268" y="326" font-size="11" fill="#333" text-anchor="middle">采集照常</text>
  <g stroke="#c62828" stroke-width="2">
    <line x1="500" y1="326" x2="524" y2="350"/>
    <line x1="524" y1="326" x2="500" y2="350"/>
  </g>
  <text x="512" y="372" font-size="11" fill="#c62828" text-anchor="middle">车间网络中断</text>
  <rect x="300" y="380" width="190" height="30" rx="6" fill="#fff" stroke="#c62828" stroke-width="1.2"/>
  <text x="395" y="400" font-size="11" fill="#c62828" text-anchor="middle">数据落本地缓存（磁盘队列）</text>

  <!-- 阶段3 恢复 -->
  <rect x="55" y="440" width="1105" height="180" fill="#eef3f8" opacity="0.6"/>
  <text x="70" y="460" font-size="11" font-weight="600" fill="#1168bd">恢复期</text>
  <line x1="395" y1="488" x2="641" y2="488" stroke="#555" stroke-width="1.5" marker-end="url(#ofarr)"/>
  <text x="518" y="478" font-size="11" fill="#333" text-anchor="middle">MQTT 重连 + 按序补传（缓存队列）</text>
  <line x1="645" y1="514" x2="891" y2="514" stroke="#555" stroke-width="1.5" marker-end="url(#ofarr)"/>
  <text x="768" y="504" font-size="11" fill="#333" text-anchor="middle">积压消息（可能与已收部分重叠）</text>
  <line x1="895" y1="546" x2="1091" y2="546" stroke="#555" stroke-width="1.5" marker-end="url(#ofarr)"/>
  <text x="993" y="536" font-size="11" fill="#333" text-anchor="middle">INSERT OR IGNORE</text>
  <rect x="790" y="566" width="220" height="40" rx="6" fill="#fff" stroke="#2e7d32" stroke-width="1.2"/>
  <text x="900" y="583" font-size="10.5" fill="#2e7d32" text-anchor="middle">重复点 duplicates 跳过：不入库、</text>
  <text x="900" y="598" font-size="10.5" fill="#2e7d32" text-anchor="middle">不重复累计聚合、不误触发告警</text>

  <text x="600" y="650" font-size="12.5" font-weight="600" fill="#1a1a1a" text-anchor="middle">最终状态：时间序列无缺口、无重复——冒烟实录见 4.3 节（同批重发 inserted:0 / duplicates:2）</text>

  <!-- 图例 -->
  <g>
    <rect x="700" y="682" width="24" height="14" rx="3" fill="#f0f7f0"/>
    <text x="732" y="694" font-size="11" fill="#555">正常期</text>
    <rect x="800" y="682" width="24" height="14" rx="3" fill="#fdf0f0"/>
    <text x="832" y="694" font-size="11" fill="#555">断网期</text>
    <rect x="898" y="682" width="24" height="14" rx="3" fill="#eef3f8"/>
    <text x="930" y="694" font-size="11" fill="#555">恢复期</text>
  </g>
</svg>
