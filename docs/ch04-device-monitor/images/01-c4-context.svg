<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">
  <desc>案例三 C4 系统上下文图：2000 台设备经车间网关持续供数（最重要的外部参与者是设备而非人）；值班员与生产主管为低频使用者。</desc>
  <defs>
    <marker id="d1arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#555"/>
    </marker>
  </defs>

  <text x="40" y="44" font-size="20" font-weight="700" fill="#1a1a1a">C4 · L1 系统上下文：液压设备状态监测系统</text>
  <text x="40" y="70" font-size="13" fill="#666">边界外最重要的参与者不是人，是持续供数的设备与网关——这是行业系统与办公信息化的第一个分野</text>

  <!-- 设备与网关 -->
  <g>
    <rect x="70" y="150" width="230" height="200" rx="10" fill="#999999"/>
    <text x="185" y="182" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">液压设备群（约 2000 台）</text>
    <text x="185" y="204" font-size="11" fill="#eee" text-anchor="middle">[外部] 液压站 · 主泵 · 阀组 · 冷却</text>
    <g fill="#c9c9c9">
      <rect x="100" y="222" width="52" height="36" rx="4"/>
      <rect x="164" y="222" width="52" height="36" rx="4"/>
      <rect x="228" y="222" width="52" height="36" rx="4"/>
    </g>
    <text x="185" y="284" font-size="11" fill="#eee" text-anchor="middle">HYD-PMP-01 主泵 · HYD-CLR-01 冷却</text>
    <text x="185" y="304" font-size="11" fill="#eee" text-anchor="middle">HYD-FLW-01 主回路 · ZeMA 液压试验台</text>
    <text x="185" y="332" font-size="11" fill="#eee" text-anchor="middle">Modbus TCP/RTU · 多速率采样</text>
  </g>

  <rect x="70" y="420" width="230" height="110" rx="10" fill="#999999"/>
  <text x="185" y="454" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">车间网关</text>
  <text x="185" y="478" font-size="11" fill="#eee" text-anchor="middle">[外部] 西门子 S7-1200 等</text>
  <text x="185" y="500" font-size="11" fill="#eee" text-anchor="middle">协议归一 · 断网本地缓存</text>

  <!-- 本系统 -->
  <rect x="470" y="250" width="330" height="150" rx="10" fill="#1168bd"/>
  <text x="635" y="300" font-size="17" font-weight="700" fill="#fff" text-anchor="middle">液压设备状态监测系统</text>
  <text x="635" y="326" font-size="11" fill="#cfe3f7" text-anchor="middle">[软件系统]</text>
  <text x="635" y="352" font-size="12" fill="#cfe3f7" text-anchor="middle">遥测接入 · 实时看板 · 阈值告警</text>
  <text x="635" y="372" font-size="12" fill="#cfe3f7" text-anchor="middle">历史曲线 · 运行报表 · 台账</text>

  <!-- 人物 -->
  <g>
    <circle cx="1010" cy="180" r="15" fill="#08427b"/>
    <path d="M 980 230 Q 1010 196 1040 230 L 1040 244 L 980 244 Z" fill="#08427b"/>
    <text x="1010" y="268" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">值班员</text>
    <text x="1010" y="288" font-size="11" fill="#777" text-anchor="middle">看板 · 告警确认</text>
  </g>
  <g>
    <circle cx="1010" cy="410" r="15" fill="#08427b"/>
    <path d="M 980 460 Q 1010 426 1040 460 L 1040 474 L 980 474 Z" fill="#08427b"/>
    <text x="1010" y="498" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">生产主管</text>
    <text x="1010" y="518" font-size="11" fill="#777" text-anchor="middle">运行报表 · 台账</text>
  </g>

  <!-- 连线 -->
  <path d="M 185 354 L 185 416" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#d1arr)"/>
  <text x="196" y="392" font-size="11" fill="#555">采集</text>
  <path d="M 304 452 L 466 372" fill="none" stroke="#555" stroke-width="1.8" marker-end="url(#d1arr)"/>
  <rect x="308" y="396" width="156" height="18" fill="#fff"/>
  <text x="386" y="410" font-size="12" fill="#555" text-anchor="middle">MQTT · ≈400 点/秒（持续）</text>
  <path d="M 804 300 L 976 236" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#d1arr)"/>
  <rect x="822" y="252" width="130" height="18" fill="#fff"/>
  <text x="887" y="266" font-size="12" fill="#555" text-anchor="middle">看板 · 告警（低频）</text>
  <path d="M 804 360 L 976 430" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#d1arr)"/>
  <rect x="826" y="380" width="120" height="18" fill="#fff"/>
  <text x="886" y="394" font-size="12" fill="#555" text-anchor="middle">报表（日/月）</text>

  <!-- 图例 -->
  <g>
    <circle cx="486" cy="592" r="7" fill="#08427b"/>
    <text x="502" y="596" font-size="11" fill="#555">人物/角色</text>
    <rect x="586" y="584" width="26" height="16" rx="4" fill="#1168bd"/>
    <text x="620" y="596" font-size="11" fill="#555">本系统</text>
    <rect x="688" y="584" width="26" height="16" rx="4" fill="#999999"/>
    <text x="722" y="596" font-size="11" fill="#555">外部（设备/网关）</text>
  </g>
</svg>
