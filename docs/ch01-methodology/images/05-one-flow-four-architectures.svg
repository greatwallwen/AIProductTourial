<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">
  <desc>动画：同一套八步流程流经四组不同约束，分别落位为四种不同架构——模块化单体、模块化单体、采集查询两进程、无状态多实例加Worker。约束是架构分岔的源头。</desc>
  <defs>
    <marker id="arr5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#999"/>
    </marker>
    <path id="flow1" d="M 254 330 C 330 330 350 168 430 168 L 800 168"/>
    <path id="flow2" d="M 254 330 C 320 330 340 276 430 276 L 800 276"/>
    <path id="flow3" d="M 254 330 C 320 330 340 384 430 384 L 800 384"/>
    <path id="flow4" d="M 254 330 C 330 330 350 492 430 492 L 800 492"/>
  </defs>

  <text x="40" y="44" font-size="20" font-weight="700" fill="#1a1a1a">同一流程 × 不同约束 ⇒ 不同架构</text>
  <text x="40" y="70" font-size="13" fill="#666">全书论点的一图版：架构分岔发生在约束（第②③步），不发生在技术偏好（在浏览器中打开本图可见流动动画）</text>

  <!-- 流动路径（可见轨道） -->
  <g fill="none" stroke="#c9d2da" stroke-width="1.6">
    <use href="#flow1"/><use href="#flow2"/><use href="#flow3"/><use href="#flow4"/>
  </g>

  <!-- 左：流程盒 -->
  <rect x="54" y="268" width="200" height="124" rx="10" fill="#1168bd"/>
  <text x="154" y="316" font-size="15" font-weight="600" fill="#fff" text-anchor="middle">同一套八步流程</text>
  <text x="154" y="344" font-size="12" fill="#cfe3f7" text-anchor="middle">① → ⑧（第 1 章）</text>

  <!-- 中：约束芯片 -->
  <g>
    <rect x="430" y="140" width="286" height="56" rx="10" fill="#fdf6ec" stroke="#d9c8a9" stroke-width="1.4"/>
    <text x="450" y="163" font-size="12" font-weight="600" fill="#1a1a1a">政务约束</text>
    <text x="450" y="184" font-size="12" fill="#555">等保三级 · 政务外网 · 信创 · 弱运维</text>

    <rect x="430" y="248" width="286" height="56" rx="10" fill="#fdf6ec" stroke="#d9c8a9" stroke-width="1.4"/>
    <text x="450" y="271" font-size="12" font-weight="600" fill="#1a1a1a">企业约束</text>
    <text x="450" y="292" font-size="12" fill="#555">组织月变 · 法务自配路由 · 异构集成</text>

    <rect x="430" y="356" width="286" height="56" rx="10" fill="#fdf6ec" stroke="#d9c8a9" stroke-width="1.4"/>
    <text x="450" y="379" font-size="12" font-weight="600" fill="#1a1a1a">行业约束</text>
    <text x="450" y="400" font-size="12" fill="#555">400 点/秒时序写入 · 弱网 · 降采样</text>

    <rect x="430" y="464" width="286" height="56" rx="10" fill="#fdf6ec" stroke="#d9c8a9" stroke-width="1.4"/>
    <text x="450" y="487" font-size="12" font-weight="600" fill="#1a1a1a">SaaS 约束</text>
    <text x="450" y="508" font-size="12" fill="#555">租户隔离 · 自助计费 · SLA · 滚动发布</text>
  </g>

  <!-- 右：架构落点 -->
  <g id="arch1">
    <rect x="812" y="140" width="70" height="56" rx="6" fill="#438dd5"/>
    <rect x="820" y="148" width="24" height="18" rx="3" fill="#85bbf0"/>
    <rect x="850" y="148" width="24" height="18" rx="3" fill="#85bbf0"/>
    <rect x="820" y="170" width="24" height="18" rx="3" fill="#85bbf0"/>
    <rect x="850" y="170" width="24" height="18" rx="3" fill="#85bbf0"/>
    <text x="898" y="164" font-size="13" font-weight="600" fill="#1a1a1a">模块化单体（单进程）</text>
    <text x="898" y="184" font-size="11" fill="#777">案例一 · 第 2 章</text>
    <animate attributeName="opacity" values="0.4;0.4;1;1" keyTimes="0;0.6;0.72;1" dur="5s" begin="0s" repeatCount="indefinite"/>
  </g>
  <g id="arch2">
    <rect x="812" y="248" width="70" height="56" rx="6" fill="#438dd5"/>
    <rect x="820" y="256" width="24" height="18" rx="3" fill="#85bbf0"/>
    <rect x="850" y="256" width="24" height="18" rx="3" fill="#85bbf0"/>
    <rect x="820" y="278" width="24" height="18" rx="3" fill="#85bbf0"/>
    <rect x="850" y="278" width="24" height="18" rx="3" fill="#85bbf0"/>
    <text x="898" y="272" font-size="13" font-weight="600" fill="#1a1a1a">模块化单体（单进程）</text>
    <text x="898" y="292" font-size="11" fill="#777">案例二 · 第 3 章（内里全然不同）</text>
    <animate attributeName="opacity" values="0.4;0.4;1;1" keyTimes="0;0.6;0.72;1" dur="5s" begin="0.6s" repeatCount="indefinite"/>
  </g>
  <g id="arch3">
    <rect x="812" y="358" width="30" height="42" rx="5" fill="#438dd5"/>
    <rect x="848" y="358" width="30" height="42" rx="5" fill="#438dd5"/>
    <text x="827" y="384" font-size="9" fill="#fff" text-anchor="middle">写</text>
    <text x="863" y="384" font-size="9" fill="#fff" text-anchor="middle">读</text>
    <text x="898" y="380" font-size="13" font-weight="600" fill="#1a1a1a">采集 / 查询两进程</text>
    <text x="898" y="400" font-size="11" fill="#777">案例三 · 第 4 章（依据＝数据流）</text>
    <animate attributeName="opacity" values="0.4;0.4;1;1" keyTimes="0;0.6;0.72;1" dur="5s" begin="1.2s" repeatCount="indefinite"/>
  </g>
  <g id="arch4">
    <rect x="826" y="480" width="42" height="40" rx="5" fill="#85bbf0"/>
    <rect x="819" y="473" width="42" height="40" rx="5" fill="#5f9fd8"/>
    <rect x="812" y="466" width="42" height="40" rx="5" fill="#438dd5"/>
    <text x="833" y="490" font-size="9" fill="#fff" text-anchor="middle">×N</text>
    <text x="898" y="488" font-size="13" font-weight="600" fill="#1a1a1a">无状态×N ＋ Worker ＋ Redis</text>
    <text x="898" y="508" font-size="11" fill="#777">案例四 · 第 5 章（云原生的单体）</text>
    <animate attributeName="opacity" values="0.4;0.4;1;1" keyTimes="0;0.6;0.72;1" dur="5s" begin="1.8s" repeatCount="indefinite"/>
  </g>

  <!-- 流动粒子 -->
  <circle r="6" fill="#e65100" opacity="0">
    <animateMotion dur="5s" begin="0s" repeatCount="indefinite" keyPoints="0;1;1" keyTimes="0;0.7;1" calcMode="linear">
      <mpath href="#flow1"/>
    </animateMotion>
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.68;0.72;1" dur="5s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle r="6" fill="#e65100" opacity="0">
    <animateMotion dur="5s" begin="0.6s" repeatCount="indefinite" keyPoints="0;1;1" keyTimes="0;0.7;1" calcMode="linear">
      <mpath href="#flow2"/>
    </animateMotion>
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.68;0.72;1" dur="5s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle r="6" fill="#e65100" opacity="0">
    <animateMotion dur="5s" begin="1.2s" repeatCount="indefinite" keyPoints="0;1;1" keyTimes="0;0.7;1" calcMode="linear">
      <mpath href="#flow3"/>
    </animateMotion>
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.68;0.72;1" dur="5s" begin="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle r="6" fill="#e65100" opacity="0">
    <animateMotion dur="5s" begin="1.8s" repeatCount="indefinite" keyPoints="0;1;1" keyTimes="0;0.7;1" calcMode="linear">
      <mpath href="#flow4"/>
    </animateMotion>
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.68;0.72;1" dur="5s" begin="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- 底部结论 -->
  <text x="600" y="586" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">四个落点没有一个是微服务；而第四个落点的 Redis，有编号的证据为它作证（第 5 章 ADR-005）</text>

  <!-- 图例 -->
  <g>
    <circle cx="806" cy="622" r="5" fill="#e65100"/>
    <text x="820" y="626" font-size="11" fill="#555">流程的一次应用</text>
    <rect x="924" y="614" width="26" height="16" rx="4" fill="#fdf6ec" stroke="#d9c8a9" stroke-width="1.4"/>
    <text x="958" y="626" font-size="11" fill="#555">约束组</text>
    <rect x="1030" y="614" width="26" height="16" rx="4" fill="#438dd5"/>
    <text x="1064" y="626" font-size="11" fill="#555">架构落点</text>
  </g>
</svg>
