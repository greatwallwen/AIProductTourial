<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">
  <desc>架构风格谱系：单进程单体、模块化单体、按数据流切分的少量进程、无状态多实例加Worker、微服务；复杂度与运维成本从左到右递增；四个案例分别落位于第2、3、4档，无案例落在微服务档。</desc>
  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#555"/>
    </marker>
  </defs>

  <text x="40" y="44" font-size="20" font-weight="700" fill="#1a1a1a">架构风格谱系：复杂度是要付账的</text>
  <text x="40" y="70" font-size="13" fill="#666">备选不是"单体 vs 微服务"二选一，而是一条谱系；奥卡姆原则＝停在证据（C-xx / Q-xx）支持的最左档</text>

  <!-- 五档面板 -->
  <g>
    <!-- 1 单进程单体 -->
    <rect x="35" y="110" width="170" height="200" rx="8" fill="#f4f6f8" stroke="#8a97a3" stroke-width="1.5"/>
    <rect x="80" y="135" width="80" height="100" rx="6" fill="#438dd5"/>
    <text x="120" y="190" font-size="12" fill="#fff" text-anchor="middle">app</text>
    <text x="120" y="272" font-size="14" font-weight="600" fill="#1a1a1a" text-anchor="middle">单进程单体</text>
    <text x="120" y="293" font-size="11" fill="#777" text-anchor="middle">边界靠自觉</text>

    <!-- 2 模块化单体 -->
    <rect x="270" y="110" width="170" height="200" rx="8" fill="#f4f6f8" stroke="#e65100" stroke-width="2.5"/>
    <rect x="303" y="130" width="104" height="110" rx="6" fill="#438dd5"/>
    <rect x="311" y="140" width="40" height="30" rx="3" fill="#85bbf0"/>
    <rect x="359" y="140" width="40" height="30" rx="3" fill="#85bbf0"/>
    <rect x="311" y="178" width="40" height="30" rx="3" fill="#85bbf0"/>
    <rect x="359" y="178" width="40" height="30" rx="3" fill="#85bbf0"/>
    <text x="355" y="228" font-size="10" fill="#fff" text-anchor="middle">模块边界受工具守护</text>
    <text x="355" y="272" font-size="14" font-weight="600" fill="#1a1a1a" text-anchor="middle">模块化单体</text>
    <text x="355" y="293" font-size="11" fill="#777" text-anchor="middle">仍是一个进程</text>

    <!-- 3 按数据流切分 -->
    <rect x="505" y="110" width="170" height="200" rx="8" fill="#f4f6f8" stroke="#8a97a3" stroke-width="1.5"/>
    <rect x="527" y="140" width="56" height="76" rx="6" fill="#438dd5"/>
    <text x="555" y="182" font-size="11" fill="#fff" text-anchor="middle">写入</text>
    <rect x="597" y="140" width="56" height="76" rx="6" fill="#438dd5"/>
    <text x="625" y="182" font-size="11" fill="#fff" text-anchor="middle">查询</text>
    <ellipse cx="590" cy="238" rx="34" ry="9" fill="#438dd5"/>
    <rect x="556" y="238" width="68" height="16" fill="#438dd5"/>
    <ellipse cx="590" cy="254" rx="34" ry="9" fill="#438dd5"/>
    <text x="590" y="272" font-size="14" font-weight="600" fill="#1a1a1a" text-anchor="middle" dy="8">按数据流切分少量进程</text>
    <text x="590" y="293" font-size="11" fill="#777" text-anchor="middle" dy="8">拆分依据＝负载特征</text>

    <!-- 4 无状态多实例 -->
    <rect x="740" y="110" width="170" height="200" rx="8" fill="#f4f6f8" stroke="#8a97a3" stroke-width="1.5"/>
    <rect x="774" y="152" width="64" height="72" rx="6" fill="#85bbf0"/>
    <rect x="766" y="144" width="64" height="72" rx="6" fill="#5f9fd8"/>
    <rect x="758" y="136" width="64" height="72" rx="6" fill="#438dd5"/>
    <text x="790" y="176" font-size="11" fill="#fff" text-anchor="middle">app×N</text>
    <rect x="852" y="150" width="42" height="46" rx="6" fill="#438dd5"/>
    <text x="873" y="176" font-size="10" fill="#fff" text-anchor="middle">worker</text>
    <text x="825" y="272" font-size="14" font-weight="600" fill="#1a1a1a" text-anchor="middle">无状态多实例＋Worker</text>
    <text x="825" y="293" font-size="11" fill="#777" text-anchor="middle">仍是单体，形态云原生</text>

    <!-- 5 微服务 -->
    <rect x="975" y="110" width="190" height="200" rx="8" fill="#f4f6f8" stroke="#8a97a3" stroke-width="1.5"/>
    <g stroke="#bbb" stroke-width="1">
      <line x1="1022" y1="160" x2="1078" y2="160"/><line x1="1078" y1="160" x2="1134" y2="160"/>
      <line x1="1022" y1="160" x2="1078" y2="212"/><line x1="1078" y1="160" x2="1022" y2="212"/>
      <line x1="1134" y1="160" x2="1078" y2="212"/><line x1="1078" y1="212" x2="1134" y2="212"/>
      <line x1="1022" y1="212" x2="1078" y2="212"/><line x1="1022" y1="160" x2="1134" y2="212"/>
    </g>
    <g>
      <rect x="1004" y="146" width="36" height="28" rx="4" fill="#438dd5"/>
      <rect x="1060" y="146" width="36" height="28" rx="4" fill="#438dd5"/>
      <rect x="1116" y="146" width="36" height="28" rx="4" fill="#438dd5"/>
      <rect x="1004" y="198" width="36" height="28" rx="4" fill="#438dd5"/>
      <rect x="1060" y="198" width="36" height="28" rx="4" fill="#438dd5"/>
      <rect x="1116" y="198" width="36" height="28" rx="4" fill="#438dd5"/>
    </g>
    <text x="1070" y="252" font-size="10" fill="#777" text-anchor="middle">＋网关·注册中心·追踪·治理</text>
    <text x="1070" y="272" font-size="14" font-weight="600" fill="#1a1a1a" text-anchor="middle">微服务</text>
    <text x="1070" y="293" font-size="11" fill="#777" text-anchor="middle">组织成本为主成本</text>
  </g>

  <!-- 档间箭头 -->
  <line x1="208" y1="205" x2="266" y2="205" stroke="#555" stroke-width="1.6" marker-end="url(#arr3)"/>
  <line x1="443" y1="205" x2="501" y2="205" stroke="#555" stroke-width="1.6" marker-end="url(#arr3)"/>
  <line x1="678" y1="205" x2="736" y2="205" stroke="#555" stroke-width="1.6" marker-end="url(#arr3)"/>
  <line x1="913" y1="205" x2="971" y2="205" stroke="#555" stroke-width="1.6" marker-end="url(#arr3)"/>

  <!-- 案例落位 -->
  <g font-size="12" font-weight="600" fill="#e65100" text-anchor="middle">
    <text x="355" y="340">▲ 案例一 · 案例二</text>
    <text x="590" y="340" dy="8">▲ 案例三</text>
    <text x="825" y="340">▲ 案例四</text>
    <text x="1070" y="340" fill="#999" font-weight="400">（本书无案例落此档）</text>
  </g>

  <!-- 成本轴 -->
  <line x1="35" y1="392" x2="1150" y2="392" stroke="#555" stroke-width="2" marker-end="url(#arr3)"/>
  <text x="1160" y="374" font-size="12" fill="#555" text-anchor="end">复杂度 · 运维技能要求 · 组织协同成本</text>

  <!-- 每档间的新增付出 -->
  <g font-size="11" fill="#c62828" text-anchor="middle">
    <text x="237" y="418">新增付出：</text>
    <text x="237" y="436">模块纪律（近乎免费）</text>
    <text x="472" y="418">新增付出：进程间通信</text>
    <text x="472" y="436">部分失败 · 独立发布</text>
    <text x="707" y="418">新增付出：无状态改造</text>
    <text x="707" y="436">会话外置 · 滚动发布</text>
    <text x="942" y="418">新增付出：服务治理</text>
    <text x="942" y="436">分布式事务 · 跨服务追踪</text>
  </g>

  <!-- 图例 -->
  <g>
    <rect x="620" y="500" width="26" height="16" rx="4" fill="#f4f6f8" stroke="#8a97a3" stroke-width="1.5"/>
    <text x="654" y="513" font-size="11" fill="#555">风格档位</text>
    <rect x="740" y="500" width="26" height="16" rx="4" fill="#f4f6f8" stroke="#e65100" stroke-width="2.5"/>
    <text x="774" y="513" font-size="11" fill="#555">信息化系统的默认起点</text>
    <text x="940" y="513" font-size="11" fill="#e65100" font-weight="600">▲</text>
    <text x="956" y="513" font-size="11" fill="#555">本书案例落位</text>
  </g>
</svg>
