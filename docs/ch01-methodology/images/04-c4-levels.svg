<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">
  <desc>C4 模型四层抽象：L1 系统上下文、L2 容器、L3 组件、L4 代码；逐层放大；本书只画前两层，组件层由工程目录结构表达，代码层不画。</desc>
  <defs>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#555"/>
    </marker>
  </defs>

  <text x="40" y="44" font-size="20" font-weight="700" fill="#1a1a1a">C4 模型：四层缩放，代替一张什么都想说的"架构总图"</text>
  <text x="40" y="70" font-size="13" fill="#666">来源：c4model.com（Simon Brown）。一张图、一个抽象层级、一个受众；C4 的"容器"＝可运行/可存储单元，不是 Docker 容器</text>

  <!-- 缩放连接带（画在面板之下） -->
  <polygon points="238,206 328,120 328,460 238,258" fill="#eef3f8"/>
  <polygon points="528,262 618,120 618,460 528,330" fill="#eef3f8"/>
  <polygon points="808,300 898,120 898,460 808,352" fill="#eef3f8"/>

  <!-- L1 面板 -->
  <g>
    <rect x="38" y="120" width="200" height="340" rx="10" fill="#fff" stroke="#8a97a3" stroke-width="1.5"/>
    <text x="58" y="150" font-size="15" font-weight="600" fill="#1a1a1a">L1 系统上下文</text>
    <text x="58" y="170" font-size="11" fill="#777">系统边界内外有谁</text>
    <circle cx="138" cy="205" r="11" fill="#08427b"/>
    <path d="M 120 238 Q 138 218 156 238 L 156 248 L 120 248 Z" fill="#08427b"/>
    <text x="138" y="264" font-size="10" fill="#444" text-anchor="middle">申请企业</text>
    <line x1="138" y1="270" x2="138" y2="292" stroke="#555" stroke-width="1.4" marker-end="url(#arr4)"/>
    <rect x="78" y="296" width="120" height="44" rx="6" fill="#1168bd"/>
    <text x="138" y="322" font-size="11" fill="#fff" text-anchor="middle">本系统</text>
    <line x1="138" y1="342" x2="138" y2="364" stroke="#555" stroke-width="1.4" marker-end="url(#arr4)"/>
    <rect x="78" y="368" width="120" height="40" rx="6" fill="#999999"/>
    <text x="138" y="392" font-size="11" fill="#fff" text-anchor="middle">外部系统</text>
  </g>

  <!-- L2 面板 -->
  <g>
    <rect x="328" y="120" width="200" height="340" rx="10" fill="#fff" stroke="#8a97a3" stroke-width="1.5"/>
    <text x="348" y="150" font-size="15" font-weight="600" fill="#1a1a1a">L2 容器</text>
    <text x="348" y="170" font-size="11" fill="#777">有哪些运行/存储单元</text>
    <rect x="348" y="186" width="160" height="252" rx="8" fill="none" stroke="#444" stroke-width="1.2" stroke-dasharray="6 4"/>
    <rect x="366" y="200" width="124" height="40" rx="6" fill="#438dd5"/>
    <text x="428" y="224" font-size="11" fill="#fff" text-anchor="middle">SPA 前端</text>
    <line x1="428" y1="242" x2="428" y2="262" stroke="#555" stroke-width="1.4" marker-end="url(#arr4)"/>
    <rect x="366" y="266" width="124" height="40" rx="6" fill="#438dd5"/>
    <text x="428" y="290" font-size="11" fill="#fff" text-anchor="middle">API 单体进程</text>
    <line x1="428" y1="308" x2="428" y2="330" stroke="#555" stroke-width="1.4" marker-end="url(#arr4)"/>
    <ellipse cx="428" cy="342" rx="46" ry="10" fill="#438dd5"/>
    <rect x="382" y="342" width="92" height="42" fill="#438dd5"/>
    <ellipse cx="428" cy="384" rx="46" ry="10" fill="#438dd5"/>
    <text x="428" y="368" font-size="11" fill="#fff" text-anchor="middle">数据库</text>
  </g>

  <!-- L3 面板 -->
  <g>
    <rect x="618" y="120" width="200" height="340" rx="10" fill="#fff" stroke="#8a97a3" stroke-width="1.5"/>
    <text x="638" y="150" font-size="15" font-weight="600" fill="#1a1a1a">L3 组件</text>
    <text x="638" y="170" font-size="11" fill="#777">某容器内部的模块</text>
    <rect x="638" y="186" width="160" height="252" rx="8" fill="none" stroke="#444" stroke-width="1.2" stroke-dasharray="6 4"/>
    <text x="648" y="204" font-size="10" fill="#444">API 容器内部</text>
    <rect x="656" y="214" width="124" height="38" rx="6" fill="#85bbf0"/>
    <text x="718" y="237" font-size="11" fill="#1a1a1a" text-anchor="middle">routes（HTTP层）</text>
    <line x1="718" y1="252" x2="718" y2="270" stroke="#555" stroke-width="1.4" marker-end="url(#arr4)"/>
    <rect x="656" y="274" width="124" height="38" rx="6" fill="#85bbf0"/>
    <text x="718" y="297" font-size="11" fill="#1a1a1a" text-anchor="middle">service（业务）</text>
    <line x1="718" y1="312" x2="718" y2="330" stroke="#555" stroke-width="1.4" marker-end="url(#arr4)"/>
    <rect x="656" y="334" width="124" height="38" rx="6" fill="#85bbf0"/>
    <text x="718" y="357" font-size="11" fill="#1a1a1a" text-anchor="middle">repo（仅 SQL）</text>
    <text x="718" y="416" font-size="10" fill="#2e7d32" text-anchor="middle">本书用目录结构＋架构守护</text>
    <text x="718" y="432" font-size="10" fill="#2e7d32" text-anchor="middle">测试表达此层（附录 C）</text>
  </g>

  <!-- L4 面板 -->
  <g>
    <rect x="908" y="120" width="200" height="340" rx="10" fill="#f4f6f8" stroke="#8a97a3" stroke-width="1.5"/>
    <text x="928" y="150" font-size="15" font-weight="600" fill="#777">L4 代码</text>
    <text x="928" y="170" font-size="11" fill="#999">类/函数级结构</text>
    <g fill="#c9d2da">
      <rect x="928" y="196" width="150" height="10" rx="3"/>
      <rect x="928" y="216" width="120" height="10" rx="3"/>
      <rect x="944" y="236" width="120" height="10" rx="3"/>
      <rect x="944" y="256" width="96" height="10" rx="3"/>
      <rect x="928" y="276" width="134" height="10" rx="3"/>
    </g>
    <text x="1008" y="336" font-size="26" font-weight="700" fill="#c62828" text-anchor="middle">不 画</text>
    <text x="1008" y="368" font-size="11" fill="#777" text-anchor="middle">维护成本高于阅读价值</text>
    <text x="1008" y="386" font-size="11" fill="#777" text-anchor="middle">代码即此层文档</text>
  </g>

  <!-- 底部：受众与本书态度 -->
  <g font-size="12">
    <text x="138" y="496" text-anchor="middle" fill="#555">受众：所有人（含非技术）</text>
    <text x="138" y="518" text-anchor="middle" font-weight="600" fill="#2e7d32">本书：每案例必画</text>
    <text x="428" y="496" text-anchor="middle" fill="#555">受众：开发与运维</text>
    <text x="428" y="518" text-anchor="middle" font-weight="600" fill="#2e7d32">本书：每案例必画</text>
    <text x="718" y="496" text-anchor="middle" fill="#555">受众：该容器的开发者</text>
    <text x="718" y="518" text-anchor="middle" font-weight="600" fill="#e65100">本书：只画有争议的局部</text>
    <text x="1008" y="496" text-anchor="middle" fill="#555">受众：——</text>
    <text x="1008" y="518" text-anchor="middle" font-weight="600" fill="#c62828">本书：不画</text>
  </g>

  <!-- 图例 -->
  <g>
    <circle cx="576" cy="576" r="7" fill="#08427b"/>
    <text x="592" y="580" font-size="11" fill="#555">人物/角色</text>
    <rect x="672" y="568" width="26" height="16" rx="4" fill="#1168bd"/>
    <text x="706" y="580" font-size="11" fill="#555">本系统</text>
    <rect x="772" y="568" width="26" height="16" rx="4" fill="#438dd5"/>
    <text x="806" y="580" font-size="11" fill="#555">容器</text>
    <rect x="856" y="568" width="26" height="16" rx="4" fill="#85bbf0"/>
    <text x="890" y="580" font-size="11" fill="#555">组件</text>
    <rect x="938" y="568" width="26" height="16" rx="4" fill="#999999"/>
    <text x="972" y="580" font-size="11" fill="#555">外部系统</text>
    <rect x="1052" y="568" width="26" height="16" rx="4" fill="none" stroke="#444" stroke-width="1.2" stroke-dasharray="6 4"/>
    <text x="1086" y="580" font-size="11" fill="#555">边界</text>
  </g>
</svg>
