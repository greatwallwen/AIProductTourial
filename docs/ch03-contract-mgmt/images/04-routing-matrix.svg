<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">
  <desc>动画：三份不同金额的合同提交后，按金额区间落入不同审批链——8.64万走2步链，48.6万走3步链，128万走4步链；链在提交时物化为任务快照。</desc>
  <defs>
    <marker id="rmarr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#999"/>
    </marker>
    <path id="rmflow1" d="M 255 310 C 320 310 340 172 415 172"/>
    <path id="rmflow2" d="M 255 330 C 310 330 330 332 415 332"/>
    <path id="rmflow3" d="M 255 350 C 320 350 340 492 415 492"/>
  </defs>

  <text x="40" y="44" font-size="20" font-weight="700" fill="#1a1a1a">表驱动路由：金额决定链，链即快照（动画）</text>
  <text x="40" y="70" font-size="13" fill="#666">规则是数据（法务可改），已生成的链是快照（审计可回放）；生产设计在金额之外再加"合同类型"维度</text>

  <!-- 轨道 -->
  <g fill="none" stroke="#dfe5ea" stroke-width="1.6">
    <use href="#rmflow1"/><use href="#rmflow2"/><use href="#rmflow3"/>
  </g>

  <!-- 源 -->
  <rect x="60" y="280" width="195" height="100" rx="10" fill="#1168bd"/>
  <text x="157" y="318" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">合同提交 submit</text>
  <text x="157" y="344" font-size="11" fill="#cfe3f7" text-anchor="middle">读取 routing_rules</text>
  <text x="157" y="362" font-size="11" fill="#cfe3f7" text-anchor="middle">物化 approval_tasks</text>

  <!-- 金额分档 -->
  <g>
    <rect x="415" y="140" width="210" height="64" rx="10" fill="#fdf6ec" stroke="#d9c8a9" stroke-width="1.4"/>
    <text x="520" y="166" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">金额 &lt; 10 万</text>
    <text x="520" y="188" font-size="11" fill="#777" text-anchor="middle">示例：¥86,400 办公用品采购</text>

    <rect x="415" y="300" width="210" height="64" rx="10" fill="#fdf6ec" stroke="#d9c8a9" stroke-width="1.4"/>
    <text x="520" y="326" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">10 万 ≤ 金额 &lt; 100 万</text>
    <text x="520" y="348" font-size="11" fill="#777" text-anchor="middle">示例：¥486,000 IDC 托管</text>

    <rect x="415" y="460" width="210" height="64" rx="10" fill="#fdf6ec" stroke="#d9c8a9" stroke-width="1.4"/>
    <text x="520" y="486" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">金额 ≥ 100 万</text>
    <text x="520" y="508" font-size="11" fill="#777" text-anchor="middle">示例：¥1,280,000 仓储总包</text>
  </g>

  <!-- 链1：2步 -->
  <g id="rmchain1">
    <rect x="672" y="150" width="104" height="44" rx="7" fill="#438dd5"/>
    <text x="724" y="169" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">① 法务</text>
    <text x="724" y="186" font-size="10" fill="#e8f1fa" text-anchor="middle">周敏</text>
    <line x1="778" y1="172" x2="800" y2="172" stroke="#555" stroke-width="1.5" marker-end="url(#rmarr)"/>
    <rect x="804" y="150" width="104" height="44" rx="7" fill="#438dd5"/>
    <text x="856" y="169" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">② 部门负责人</text>
    <text x="856" y="186" font-size="10" fill="#e8f1fa" text-anchor="middle">王建国</text>
    <text x="940" y="177" font-size="12" fill="#2e7d32" font-weight="600">→ 2 步链</text>
    <animate attributeName="opacity" values="0.35;0.35;1;1" keyTimes="0;0.55;0.68;1" dur="6s" begin="0s" repeatCount="indefinite"/>
  </g>

  <!-- 链2：3步 -->
  <g id="rmchain2">
    <rect x="672" y="310" width="104" height="44" rx="7" fill="#438dd5"/>
    <text x="724" y="329" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">① 法务</text>
    <text x="724" y="346" font-size="10" fill="#e8f1fa" text-anchor="middle">周敏</text>
    <line x1="778" y1="332" x2="800" y2="332" stroke="#555" stroke-width="1.5" marker-end="url(#rmarr)"/>
    <rect x="804" y="310" width="104" height="44" rx="7" fill="#438dd5"/>
    <text x="856" y="329" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">② 部门负责人</text>
    <text x="856" y="346" font-size="10" fill="#e8f1fa" text-anchor="middle">王建国</text>
    <line x1="910" y1="332" x2="932" y2="332" stroke="#555" stroke-width="1.5" marker-end="url(#rmarr)"/>
    <rect x="936" y="310" width="104" height="44" rx="7" fill="#438dd5"/>
    <text x="988" y="329" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">③ 分管副总</text>
    <text x="988" y="346" font-size="10" fill="#e8f1fa" text-anchor="middle">李雪梅</text>
    <text x="1064" y="337" font-size="12" fill="#2e7d32" font-weight="600">→ 3 步</text>
    <animate attributeName="opacity" values="0.35;0.35;1;1" keyTimes="0;0.55;0.68;1" dur="6s" begin="1s" repeatCount="indefinite"/>
  </g>

  <!-- 链3：4步 -->
  <g id="rmchain3">
    <rect x="672" y="470" width="104" height="44" rx="7" fill="#438dd5"/>
    <text x="724" y="489" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">① 法务</text>
    <text x="724" y="506" font-size="10" fill="#e8f1fa" text-anchor="middle">周敏</text>
    <line x1="778" y1="492" x2="800" y2="492" stroke="#555" stroke-width="1.5" marker-end="url(#rmarr)"/>
    <rect x="804" y="470" width="104" height="44" rx="7" fill="#438dd5"/>
    <text x="856" y="489" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">② 部门负责人</text>
    <text x="856" y="506" font-size="10" fill="#e8f1fa" text-anchor="middle">王建国</text>
    <line x1="910" y1="492" x2="932" y2="492" stroke="#555" stroke-width="1.5" marker-end="url(#rmarr)"/>
    <rect x="936" y="470" width="104" height="44" rx="7" fill="#438dd5"/>
    <text x="988" y="489" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">③ 分管副总</text>
    <text x="988" y="506" font-size="10" fill="#e8f1fa" text-anchor="middle">李雪梅</text>
    <line x1="1042" y1="492" x2="1064" y2="492" stroke="#555" stroke-width="1.5" marker-end="url(#rmarr)"/>
    <rect x="1068" y="470" width="104" height="44" rx="7" fill="#1168bd"/>
    <text x="1120" y="489" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">④ 总经理</text>
    <text x="1120" y="506" font-size="10" fill="#e8f1fa" text-anchor="middle">陈志远</text>
    <animate attributeName="opacity" values="0.35;0.35;1;1" keyTimes="0;0.55;0.68;1" dur="6s" begin="2s" repeatCount="indefinite"/>
  </g>

  <!-- 流动合同芯片 -->
  <g opacity="0">
    <rect x="-55" y="-16" width="110" height="32" rx="7" fill="#e65100"/>
    <text x="0" y="4" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">¥86,400</text>
    <animateMotion dur="6s" begin="0s" repeatCount="indefinite" keyPoints="0;1;1" keyTimes="0;0.6;1" calcMode="linear">
      <mpath href="#rmflow1"/>
    </animateMotion>
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.58;0.64;1" dur="6s" begin="0s" repeatCount="indefinite"/>
  </g>
  <g opacity="0">
    <rect x="-55" y="-16" width="110" height="32" rx="7" fill="#e65100"/>
    <text x="0" y="4" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">¥486,000</text>
    <animateMotion dur="6s" begin="1s" repeatCount="indefinite" keyPoints="0;1;1" keyTimes="0;0.6;1" calcMode="linear">
      <mpath href="#rmflow2"/>
    </animateMotion>
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.58;0.64;1" dur="6s" begin="1s" repeatCount="indefinite"/>
  </g>
  <g opacity="0">
    <rect x="-55" y="-16" width="110" height="32" rx="7" fill="#e65100"/>
    <text x="0" y="4" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">¥1,280,000</text>
    <animateMotion dur="6s" begin="2s" repeatCount="indefinite" keyPoints="0;1;1" keyTimes="0;0.6;1" calcMode="linear">
      <mpath href="#rmflow3"/>
    </animateMotion>
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.58;0.64;1" dur="6s" begin="2s" repeatCount="indefinite"/>
  </g>

  <text x="600" y="590" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">规则改了，在途的链不变——审计看到的永远是"当时规则下的当时链"（ADR-001）</text>

  <!-- 图例 -->
  <g>
    <rect x="700" y="622" width="26" height="16" rx="4" fill="#e65100"/>
    <text x="734" y="634" font-size="11" fill="#555">提交的合同（动画）</text>
    <rect x="856" y="622" width="26" height="16" rx="4" fill="#fdf6ec" stroke="#d9c8a9" stroke-width="1.4"/>
    <text x="890" y="634" font-size="11" fill="#555">路由规则档</text>
    <rect x="986" y="622" width="26" height="16" rx="4" fill="#438dd5"/>
    <text x="1020" y="634" font-size="11" fill="#555">物化的审批步</text>
  </g>
</svg>
