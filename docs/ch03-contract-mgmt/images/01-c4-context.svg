<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">
  <desc>案例二 C4 系统上下文图：业务人员、法务、审批领导使用合同管理系统；HR 系统为组织主数据上游（拉取），钉钉为待办触达下游（推送），ERP 为主数据参照（按需查询）；电子签章为演进期对接。</desc>
  <defs>
    <marker id="c3arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#555"/>
    </marker>
  </defs>

  <text x="40" y="44" font-size="20" font-weight="700" fill="#1a1a1a">C4 · L1 系统上下文：合同管理系统</text>
  <text x="40" y="70" font-size="13" fill="#666">三条集成线方向、频率、失败语义各不相同——这是 ADR-004 拒绝"统一总线"的原始证据</text>

  <!-- 人物 -->
  <g>
    <circle cx="150" cy="170" r="16" fill="#08427b"/>
    <path d="M 118 222 Q 150 186 182 222 L 182 238 L 118 238 Z" fill="#08427b"/>
    <text x="150" y="262" font-size="14" font-weight="600" fill="#1a1a1a" text-anchor="middle">业务人员</text>
    <text x="150" y="282" font-size="11" fill="#777" text-anchor="middle">起草 · 履约跟踪</text>
  </g>
  <g>
    <circle cx="150" cy="380" r="16" fill="#08427b"/>
    <path d="M 118 432 Q 150 396 182 432 L 182 448 L 118 448 Z" fill="#08427b"/>
    <text x="150" y="472" font-size="14" font-weight="600" fill="#1a1a1a" text-anchor="middle">法务</text>
    <text x="150" y="492" font-size="11" fill="#777" text-anchor="middle">路由规则维护 · 审查</text>
  </g>
  <g>
    <circle cx="150" cy="560" r="16" fill="#08427b"/>
    <path d="M 118 612 Q 150 576 182 612 L 182 628 L 118 628 Z" fill="#08427b"/>
    <text x="150" y="652" font-size="14" font-weight="600" fill="#1a1a1a" text-anchor="middle">审批领导 / 审计</text>
  </g>

  <!-- 本系统 -->
  <rect x="440" y="280" width="330" height="150" rx="10" fill="#1168bd"/>
  <text x="605" y="330" font-size="17" font-weight="700" fill="#fff" text-anchor="middle">合同管理系统</text>
  <text x="605" y="356" font-size="11" fill="#cfe3f7" text-anchor="middle">[软件系统]</text>
  <text x="605" y="382" font-size="12" fill="#cfe3f7" text-anchor="middle">起草 · 条件路由审批 · 台账</text>
  <text x="605" y="402" font-size="12" fill="#cfe3f7" text-anchor="middle">到期提醒 · 数据权限</text>

  <!-- 外部系统 -->
  <rect x="950" y="130" width="210" height="90" rx="8" fill="#999999"/>
  <text x="1055" y="166" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">HR 系统</text>
  <text x="1055" y="188" font-size="11" fill="#eee" text-anchor="middle">[外部] 组织/人员唯一权威源</text>
  <text x="1055" y="206" font-size="11" fill="#eee" text-anchor="middle">本系统只读（C-03）</text>

  <rect x="950" y="280" width="210" height="86" rx="8" fill="#999999"/>
  <text x="1055" y="316" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">钉钉开放平台</text>
  <text x="1055" y="340" font-size="11" fill="#eee" text-anchor="middle">[外部] 审批待办触达（C-04）</text>

  <rect x="950" y="420" width="210" height="86" rx="8" fill="#999999"/>
  <text x="1055" y="456" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">ERP 系统</text>
  <text x="1055" y="480" font-size="11" fill="#eee" text-anchor="middle">[外部] 供应商/客户主数据</text>

  <rect x="950" y="560" width="210" height="80" rx="8" fill="none" stroke="#999" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="1055" y="594" font-size="14" font-weight="600" fill="#888" text-anchor="middle">电子签章服务</text>
  <text x="1055" y="616" font-size="11" fill="#999" text-anchor="middle">[外部] 演进期对接（E-02）</text>

  <!-- 人物连线 -->
  <path d="M 195 220 L 436 310" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#c3arr)"/>
  <rect x="240" y="240" width="150" height="18" fill="#fff"/>
  <text x="315" y="254" font-size="12" fill="#555" text-anchor="middle">起草 · 台账 · 提醒</text>
  <path d="M 195 400 L 436 370" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#c3arr)"/>
  <rect x="245" y="368" width="140" height="18" fill="#fff"/>
  <text x="315" y="382" font-size="12" fill="#555" text-anchor="middle">改路由规则（Q-01）</text>
  <path d="M 195 580 L 436 415" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#c3arr)"/>
  <rect x="245" y="490" width="140" height="18" fill="#fff"/>
  <text x="315" y="504" font-size="12" fill="#555" text-anchor="middle">审批 · 审计回放</text>

  <!-- 集成连线：注意方向 -->
  <path d="M 774 300 L 946 190" fill="none" stroke="#555" stroke-width="1.6" marker-start="url(#c3arr)"/>
  <rect x="770" y="222" width="166" height="18" fill="#fff"/>
  <text x="853" y="236" font-size="12" fill="#555" text-anchor="middle">每日拉取组织快照（入站）</text>

  <path d="M 774 342 L 946 328" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#c3arr)"/>
  <rect x="780" y="310" width="156" height="18" fill="#fff"/>
  <text x="858" y="324" font-size="12" fill="#555" text-anchor="middle">待办推送（出站重试表）</text>

  <path d="M 774 400 L 946 452" fill="none" stroke="#555" stroke-width="1.6" marker-start="url(#c3arr)"/>
  <rect x="780" y="408" width="156" height="18" fill="#fff"/>
  <text x="858" y="422" font-size="12" fill="#555" text-anchor="middle">主数据按需查询（入站）</text>

  <path d="M 750 430 L 946 588" fill="none" stroke="#999" stroke-width="1.6" stroke-dasharray="7 5" marker-end="url(#c3arr)"/>
  <rect x="790" y="500" width="120" height="18" fill="#fff"/>
  <text x="850" y="514" font-size="12" fill="#999" text-anchor="middle">用印签章（演进）</text>

  <!-- 图例 -->
  <g>
    <circle cx="446" cy="662" r="7" fill="#08427b"/>
    <text x="462" y="666" font-size="11" fill="#555">人物/角色</text>
    <rect x="546" y="654" width="26" height="16" rx="4" fill="#1168bd"/>
    <text x="580" y="666" font-size="11" fill="#555">本系统</text>
    <rect x="648" y="654" width="26" height="16" rx="4" fill="#999999"/>
    <text x="682" y="666" font-size="11" fill="#555">外部系统</text>
    <line x1="762" y1="662" x2="798" y2="662" stroke="#999" stroke-width="1.6" stroke-dasharray="7 5"/>
    <text x="806" y="666" font-size="11" fill="#555">演进期对接</text>
  </g>
</svg>
