<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">
  <desc>合同状态机：draft、approving、active、terminated 及 rejected 驳回支线；expired 为查询时派生状态不落库。状态集与迁移方向与工程 CONTRACT_TRANSITIONS 邻接表一致；terminate 对应 POST /contracts/:no/terminate 接口，submit/approve 由审批模块驱动。</desc>
  <defs>
    <marker id="csarr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#555"/>
    </marker>
  </defs>

  <text x="40" y="44" font-size="20" font-weight="700" fill="#1a1a1a">合同状态机（第一层；第二层是审批链，见路由矩阵图）</text>
  <text x="40" y="70" font-size="13" fill="#666">expired 不在状态集里——它由 expire_date 查询时派生，少一个要维护一致性的冗余字段（3.3 节）</text>

  <circle cx="70" cy="208" r="8" fill="#1a1a1a"/>
  <line x1="78" y1="208" x2="106" y2="208" stroke="#555" stroke-width="1.6" marker-end="url(#csarr)"/>

  <rect x="110" y="180" width="160" height="56" rx="10" fill="#f4f6f8" stroke="#8a97a3" stroke-width="1.6"/>
  <text x="190" y="203" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle" font-family="monospace">draft</text>
  <text x="190" y="224" font-size="11" fill="#777" text-anchor="middle">起草中（可修改）</text>

  <rect x="390" y="180" width="160" height="56" rx="10" fill="#f4f6f8" stroke="#8a97a3" stroke-width="1.6"/>
  <text x="470" y="203" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle" font-family="monospace">approving</text>
  <text x="470" y="224" font-size="11" fill="#777" text-anchor="middle">审批中（链在流转）</text>

  <rect x="670" y="180" width="160" height="56" rx="10" fill="#f0f7f0" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="750" y="203" font-size="13" font-weight="600" fill="#2e7d32" text-anchor="middle" font-family="monospace">active</text>
  <text x="750" y="224" font-size="11" fill="#2e7d32" text-anchor="middle">已生效（履约中）</text>

  <rect x="950" y="180" width="170" height="56" rx="10" fill="#f4f6f8" stroke="#8a97a3" stroke-width="2.4"/>
  <rect x="955" y="185" width="160" height="46" rx="7" fill="none" stroke="#8a97a3" stroke-width="1"/>
  <text x="1035" y="203" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle" font-family="monospace">terminated</text>
  <text x="1035" y="224" font-size="11" fill="#777" text-anchor="middle">已终止/已解除</text>

  <rect x="390" y="360" width="160" height="56" rx="10" fill="#fdf6ec" stroke="#e65100" stroke-width="1.6"/>
  <text x="470" y="383" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle" font-family="monospace">rejected</text>
  <text x="470" y="404" font-size="11" fill="#777" text-anchor="middle">被驳回（可改后重提）</text>

  <line x1="272" y1="208" x2="386" y2="208" stroke="#555" stroke-width="1.6" marker-end="url(#csarr)"/>
  <text x="329" y="196" font-size="11" fill="#555" text-anchor="middle" font-family="monospace">submit（物化审批链）</text>

  <line x1="552" y1="208" x2="666" y2="208" stroke="#555" stroke-width="1.6" marker-end="url(#csarr)"/>
  <text x="609" y="196" font-size="11" fill="#555" text-anchor="middle" font-family="monospace">全链通过</text>

  <line x1="832" y1="208" x2="946" y2="208" stroke="#555" stroke-width="1.6" marker-end="url(#csarr)"/>
  <text x="889" y="196" font-size="11" fill="#555" text-anchor="middle" font-family="monospace">terminate</text>

  <path d="M 440 238 L 440 356" fill="none" stroke="#c62828" stroke-width="1.6" marker-end="url(#csarr)"/>
  <text x="432" y="300" font-size="11" fill="#c62828" text-anchor="end" font-family="monospace">reject（余步 skipped）</text>

  <path d="M 390 388 L 190 388 L 190 240" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#csarr)"/>
  <text x="282" y="376" font-size="11" fill="#555" text-anchor="middle" font-family="monospace">修改重提 round+1</text>

  <!-- 派生状态注记 -->
  <rect x="670" y="300" width="300" height="72" rx="8" fill="#fdf6ec" stroke="#d9c8a9" stroke-width="1.2"/>
  <text x="690" y="328" font-size="12" font-weight="600" fill="#1a1a1a">expired（派生，不落库）</text>
  <text x="690" y="350" font-size="11" fill="#555">active 且 expire_date &lt; 今天 ⇒ 台账显示"已过期"</text>
  <path d="M 760 296 L 750 240" fill="none" stroke="#d9c8a9" stroke-width="1.4" stroke-dasharray="5 4"/>

  <!-- 图例 -->
  <g>
    <rect x="700" y="462" width="24" height="15" rx="4" fill="#f4f6f8" stroke="#8a97a3" stroke-width="1.5"/>
    <text x="732" y="474" font-size="11" fill="#555">状态</text>
    <rect x="788" y="462" width="24" height="15" rx="4" fill="#f0f7f0" stroke="#2e7d32" stroke-width="1.8"/>
    <text x="820" y="474" font-size="11" fill="#555">生效态</text>
    <rect x="884" y="462" width="24" height="15" rx="4" fill="#fdf6ec" stroke="#d9c8a9" stroke-width="1.2"/>
    <text x="916" y="474" font-size="11" fill="#555">派生状态（查询时计算）</text>
  </g>
</svg>
