<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">
  <desc>案例二 C4 容器图：SPA、API 单体（contract、approval、org、integration 四模块，node-cron 定时任务同进程）、PostgreSQL；与案例一容器形状相同、模块内容完全不同。</desc>
  <defs>
    <marker id="c4arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#555"/>
    </marker>
  </defs>

  <text x="40" y="44" font-size="20" font-weight="700" fill="#1a1a1a">C4 · L2 容器图：同样的三件套，不同的内瓤</text>
  <text x="40" y="70" font-size="13" fill="#666">与案例一容器图并排看：容器形状几乎相同，模块分区完全不同——分岔在第②③步，不在第⑤步</text>

  <!-- 用户 -->
  <g>
    <circle cx="120" cy="150" r="14" fill="#08427b"/>
    <path d="M 92 196 Q 120 164 148 196 L 148 210 L 92 210 Z" fill="#08427b"/>
    <text x="120" y="232" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">业务 / 法务 / 领导</text>
  </g>

  <!-- 边界 -->
  <rect x="250" y="100" width="640" height="600" rx="12" fill="none" stroke="#444" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="266" y="126" font-size="12" fill="#444">合同管理系统 [系统边界]</text>

  <!-- SPA -->
  <rect x="300" y="150" width="250" height="90" rx="8" fill="#438dd5"/>
  <text x="425" y="184" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">SPA 前端</text>
  <text x="425" y="206" font-size="11" fill="#e8f1fa" text-anchor="middle">[容器：浏览器应用]</text>
  <text x="425" y="224" font-size="11" fill="#e8f1fa" text-anchor="middle">台账 · 审批 · 规则管理</text>

  <!-- API 单体 -->
  <rect x="300" y="300" width="540" height="210" rx="8" fill="#438dd5"/>
  <text x="570" y="330" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">API 单体 [容器：Node.js 24 / Fastify 5]</text>
  <text x="570" y="350" font-size="11" fill="#e8f1fa" text-anchor="middle">含 node-cron 定时任务：组织同步 02:00 · 出站重试每分钟 · 到期扫描 08:00</text>
  <g>
    <rect x="322" y="370" width="118" height="84" rx="6" fill="#85bbf0"/>
    <text x="381" y="405" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">contract</text>
    <text x="381" y="426" font-size="10" fill="#333" text-anchor="middle">台账·提醒·状态机</text>
    <rect x="452" y="370" width="118" height="84" rx="6" fill="#85bbf0"/>
    <text x="511" y="405" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">approval</text>
    <text x="511" y="426" font-size="10" fill="#333" text-anchor="middle">路由规则·链物化</text>
    <rect x="582" y="370" width="118" height="84" rx="6" fill="#85bbf0"/>
    <text x="641" y="405" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">org</text>
    <text x="641" y="426" font-size="10" fill="#333" text-anchor="middle">部门树·数据范围</text>
    <rect x="712" y="370" width="118" height="84" rx="6" fill="#85bbf0"/>
    <text x="771" y="405" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">integration</text>
    <text x="771" y="426" font-size="10" fill="#333" text-anchor="middle">3适配器+出站表</text>
  </g>
  <text x="570" y="488" font-size="11" fill="#e8f1fa" text-anchor="middle">依赖方向与跨模块访问由架构守护测试强制（附录 C.5）</text>

  <!-- PostgreSQL -->
  <g>
    <ellipse cx="570" cy="586" rx="110" ry="14" fill="#438dd5"/>
    <rect x="460" y="586" width="220" height="66" fill="#438dd5"/>
    <ellipse cx="570" cy="652" rx="110" ry="14" fill="#438dd5"/>
    <text x="570" y="614" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">PostgreSQL</text>
    <text x="570" y="636" font-size="10" fill="#e8f1fa" text-anchor="middle">[容器] 业务+组织+出站表；pg_trgm 检索（ADR-005）</text>
  </g>

  <!-- 外部 -->
  <rect x="950" y="150" width="200" height="76" rx="8" fill="#999999"/>
  <text x="1050" y="182" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">HR 系统</text>
  <text x="1050" y="204" font-size="10" fill="#eee" text-anchor="middle">[外部] 日频拉取</text>
  <rect x="950" y="330" width="200" height="76" rx="8" fill="#999999"/>
  <text x="1050" y="362" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">钉钉开放平台</text>
  <text x="1050" y="384" font-size="10" fill="#eee" text-anchor="middle">[外部] 分钟级出站</text>
  <rect x="950" y="510" width="200" height="76" rx="8" fill="#999999"/>
  <text x="1050" y="542" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">ERP 系统</text>
  <text x="1050" y="564" font-size="10" fill="#eee" text-anchor="middle">[外部] 按需查询</text>

  <!-- 连线 -->
  <line x1="156" y1="190" x2="296" y2="190" stroke="#555" stroke-width="1.6" marker-end="url(#c4arr2)"/>
  <text x="226" y="180" font-size="11" fill="#555" text-anchor="middle">HTTPS</text>
  <path d="M 425 242 L 425 296" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#c4arr2)"/>
  <text x="500" y="272" font-size="11" fill="#555" text-anchor="middle">JSON / HTTPS</text>
  <path d="M 570 512 L 570 570" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#c4arr2)"/>
  <text x="640" y="546" font-size="11" fill="#555" text-anchor="middle">SQL（仅经 repo 层）</text>

  <path d="M 844 388 L 946 200" fill="none" stroke="#555" stroke-width="1.6" marker-start="url(#c4arr2)"/>
  <rect x="836" y="272" width="110" height="17" fill="#fff"/>
  <text x="891" y="285" font-size="11" fill="#555" text-anchor="middle">组织快照（入站）</text>
  <path d="M 844 412 L 946 380" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#c4arr2)"/>
  <rect x="850" y="376" width="92" height="17" fill="#fff"/>
  <text x="896" y="389" font-size="11" fill="#555" text-anchor="middle">待办（出站）</text>
  <path d="M 844 440 L 946 540" fill="none" stroke="#555" stroke-width="1.6" marker-start="url(#c4arr2)"/>
  <rect x="850" y="482" width="110" height="17" fill="#fff"/>
  <text x="905" y="495" font-size="11" fill="#555" text-anchor="middle">主数据（入站）</text>

  <!-- 图例 -->
  <g>
    <circle cx="316" cy="726" r="7" fill="#08427b"/>
    <text x="332" y="730" font-size="11" fill="#555">人物</text>
    <rect x="392" y="718" width="26" height="16" rx="4" fill="#438dd5"/>
    <text x="426" y="730" font-size="11" fill="#555">容器</text>
    <rect x="490" y="718" width="26" height="16" rx="4" fill="#85bbf0"/>
    <text x="524" y="730" font-size="11" fill="#555">模块</text>
    <rect x="590" y="718" width="26" height="16" rx="4" fill="#999999"/>
    <text x="624" y="730" font-size="11" fill="#555">外部系统</text>
    <rect x="722" y="718" width="26" height="16" rx="4" fill="none" stroke="#444" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="756" y="730" font-size="11" fill="#555">系统边界</text>
  </g>
</svg>
