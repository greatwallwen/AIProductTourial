<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">
  <desc>案例二部署图：集团内网单节点虚拟机（API 单体 + node-cron）+ PostgreSQL + 备份 NAS；HR/ERP 为内网系统直连，钉钉经上网代理出公网。无双机热备——可用性场景不支持该成本。</desc>
  <defs>
    <marker id="dp2arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#555"/>
    </marker>
  </defs>

  <text x="40" y="44" font-size="20" font-weight="700" fill="#1a1a1a">部署图：企业机房单节点（对照案例一的双机热备读）</text>
  <text x="40" y="70" font-size="13" fill="#666">没有热备不是疏忽：C-05 说"工作时间可用即可"，Q 表里没有可用性场景为热备作证——剃掉（1.5 节）</text>

  <!-- 内网边界 -->
  <rect x="40" y="100" width="850" height="470" rx="14" fill="none" stroke="#444" stroke-width="1.8" stroke-dasharray="8 5"/>
  <text x="60" y="128" font-size="13" font-weight="600" fill="#444">集团内网</text>

  <!-- 员工 -->
  <g>
    <circle cx="110" cy="190" r="13" fill="#08427b"/>
    <path d="M 84 232 Q 110 202 136 232 L 136 244 L 84 244 Z" fill="#08427b"/>
    <text x="110" y="266" font-size="11" font-weight="600" fill="#1a1a1a" text-anchor="middle">全员（内网办公）</text>
  </g>

  <!-- VM-APP -->
  <rect x="220" y="150" width="290" height="190" rx="10" fill="#eef3f8" stroke="#8a97a3" stroke-width="1.4"/>
  <text x="236" y="176" font-size="12" font-weight="600" fill="#1a1a1a">虚拟机 VM-APP（4C8G）</text>
  <rect x="244" y="192" width="240" height="60" rx="8" fill="#438dd5"/>
  <text x="364" y="217" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">API 单体（Node.js/Fastify）</text>
  <text x="364" y="238" font-size="10" fill="#e8f1fa" text-anchor="middle">SPA 静态资源同机托管</text>
  <rect x="244" y="262" width="240" height="60" rx="8" fill="#85bbf0"/>
  <text x="364" y="285" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">node-cron（同进程）</text>
  <text x="364" y="306" font-size="10" fill="#333" text-anchor="middle">组织同步02:00 · 重试扫描1min · 提醒08:00</text>

  <!-- PG -->
  <g>
    <ellipse cx="320" cy="420" rx="90" ry="12" fill="#438dd5"/>
    <rect x="230" y="420" width="180" height="60" fill="#438dd5"/>
    <ellipse cx="320" cy="480" rx="90" ry="12" fill="#438dd5"/>
    <text x="320" y="446" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">PostgreSQL</text>
    <text x="320" y="468" font-size="10" fill="#e8f1fa" text-anchor="middle">虚拟机 VM-DB</text>
  </g>

  <!-- NAS -->
  <rect x="520" y="430" width="200" height="64" rx="8" fill="#8a97a3"/>
  <text x="620" y="456" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">备份 NAS</text>
  <text x="620" y="478" font-size="10" fill="#eee" text-anchor="middle">每日库备份 + VM 快照</text>

  <!-- 内网其他系统 -->
  <rect x="640" y="150" width="200" height="64" rx="8" fill="#999999"/>
  <text x="740" y="176" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">HR 系统</text>
  <text x="740" y="198" font-size="10" fill="#eee" text-anchor="middle">内网直连 · 只读拉取</text>
  <rect x="640" y="240" width="200" height="64" rx="8" fill="#999999"/>
  <text x="740" y="266" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">ERP 系统</text>
  <text x="740" y="288" font-size="10" fill="#eee" text-anchor="middle">内网直连 · 按需查询</text>

  <!-- 上网代理 -->
  <rect x="760" y="350" width="120" height="56" rx="8" fill="#eef3f8" stroke="#8a97a3" stroke-width="1.4"/>
  <text x="820" y="374" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">上网代理</text>
  <text x="820" y="394" font-size="10" fill="#777" text-anchor="middle">白名单出站</text>

  <!-- 公网 -->
  <rect x="950" y="320" width="210" height="120" rx="12" fill="#fdf6ec" stroke="#d9c8a9" stroke-width="1.4"/>
  <text x="966" y="346" font-size="12" font-weight="600" fill="#8a6d3b">公网</text>
  <rect x="972" y="360" width="166" height="60" rx="8" fill="#999999"/>
  <text x="1055" y="386" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">钉钉开放平台</text>
  <text x="1055" y="406" font-size="10" fill="#eee" text-anchor="middle">HTTPS API</text>

  <!-- 连线 -->
  <line x1="146" y1="220" x2="216" y2="220" stroke="#555" stroke-width="1.6" marker-end="url(#dp2arr)"/>
  <text x="181" y="210" font-size="10" fill="#555" text-anchor="middle">HTTPS</text>
  <path d="M 340 342 L 322 404" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#dp2arr)"/>
  <text x="300" y="378" font-size="10" fill="#555" text-anchor="end">SQL</text>
  <path d="M 414 460 L 516 460" fill="none" stroke="#555" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#dp2arr)"/>
  <text x="465" y="450" font-size="10" fill="#555" text-anchor="middle">每日 01:00</text>
  <path d="M 512 220 L 636 186" fill="none" stroke="#555" stroke-width="1.4" marker-end="url(#dp2arr)"/>
  <text x="574" y="192" font-size="10" fill="#555" text-anchor="middle">拉取（日频）</text>
  <path d="M 512 250 L 636 268" fill="none" stroke="#555" stroke-width="1.4" marker-end="url(#dp2arr)"/>
  <text x="574" y="248" font-size="10" fill="#555" text-anchor="middle">查询（低频）</text>
  <path d="M 500 320 L 756 372" fill="none" stroke="#555" stroke-width="1.4" marker-end="url(#dp2arr)"/>
  <text x="620" y="336" font-size="10" fill="#555" text-anchor="middle">出站推送（经代理）</text>
  <line x1="884" y1="378" x2="966" y2="388" stroke="#555" stroke-width="1.4" marker-end="url(#dp2arr)"/>

  <!-- 恢复策略注记 -->
  <rect x="60" y="500" width="560 " height="52" rx="8" fill="#fdf6ec" stroke="#d9c8a9" stroke-width="1"/>
  <text x="76" y="522" font-size="11.5" fill="#555">故障恢复策略（运维手册，同为架构产出物）：VM 快照 + 每日库备份，</text>
  <text x="76" y="541" font-size="11.5" fill="#555">半天内重建可接受；出站表保证重建期间的待办不丢失。</text>

  <!-- 图例 -->
  <g>
    <rect x="700" y="596" width="24" height="15" rx="4" fill="#438dd5"/>
    <text x="732" y="608" font-size="11" fill="#555">本系统节点</text>
    <rect x="828" y="596" width="24" height="15" rx="4" fill="#999999"/>
    <text x="860" y="608" font-size="11" fill="#555">外部系统</text>
    <line x1="950" y1="603" x2="982" y2="603" stroke="#555" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text x="990" y="608" font-size="11" fill="#555">备份链路</text>
  </g>
</svg>
