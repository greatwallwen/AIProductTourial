<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">
  <desc>案例一 C4 容器图：SPA 前端、API 单体（内含事项目录、申报审批、通知、审计四模块）、PostgreSQL、MinIO；外部为省统一认证与短信网关。无 Redis、无消息队列。</desc>
  <defs>
    <marker id="c2arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#555"/>
    </marker>
  </defs>

  <text x="40" y="44" font-size="20" font-weight="700" fill="#1a1a1a">C4 · L2 容器图：四个可运行/可存储单元</text>
  <text x="40" y="70" font-size="13" fill="#666">"容器"＝可运行或可存储单元，不是 Docker 容器；图上找不到 Redis 与 MQ——那是 2.1 节算账的推论，不是遗漏</text>

  <!-- 用户 -->
  <g>
    <circle cx="120" cy="150" r="14" fill="#08427b"/>
    <path d="M 92 196 Q 120 164 148 196 L 148 210 L 92 210 Z" fill="#08427b"/>
    <text x="120" y="232" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">申请企业 / 审批人员</text>
  </g>

  <!-- 系统边界 -->
  <rect x="250" y="100" width="640" height="600" rx="12" fill="none" stroke="#444" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="266" y="126" font-size="12" fill="#444">事项申报审批系统 [系统边界]</text>

  <!-- SPA -->
  <rect x="300" y="150" width="250" height="96" rx="8" fill="#438dd5"/>
  <text x="425" y="184" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">SPA 前端</text>
  <text x="425" y="206" font-size="11" fill="#e8f1fa" text-anchor="middle">[容器：浏览器应用]</text>
  <text x="425" y="226" font-size="11" fill="#e8f1fa" text-anchor="middle">申报端与审批端按角色路由</text>

  <!-- API 单体 -->
  <rect x="300" y="310" width="540" height="180" rx="8" fill="#438dd5"/>
  <text x="570" y="340" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">API 单体 [容器：Node.js 24 / Fastify 5]</text>
  <text x="570" y="360" font-size="11" fill="#e8f1fa" text-anchor="middle">模块化单体：边界受架构守护测试保护（ADR-001）</text>
  <g>
    <rect x="322" y="380" width="118" height="84" rx="6" fill="#85bbf0"/>
    <text x="381" y="415" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">catalog</text>
    <text x="381" y="436" font-size="10" fill="#333" text-anchor="middle">事项目录·规则</text>
    <rect x="452" y="380" width="118" height="84" rx="6" fill="#85bbf0"/>
    <text x="511" y="415" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">application</text>
    <text x="511" y="436" font-size="10" fill="#333" text-anchor="middle">申报·状态机</text>
    <rect x="582" y="380" width="118" height="84" rx="6" fill="#85bbf0"/>
    <text x="641" y="415" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">notify</text>
    <text x="641" y="436" font-size="10" fill="#333" text-anchor="middle">出站表+重试</text>
    <rect x="712" y="380" width="118" height="84" rx="6" fill="#85bbf0"/>
    <text x="771" y="415" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">audit</text>
    <text x="771" y="436" font-size="10" fill="#333" text-anchor="middle">留痕只增不改</text>
  </g>

  <!-- PostgreSQL -->
  <g>
    <ellipse cx="420" cy="576" rx="90" ry="14" fill="#438dd5"/>
    <rect x="330" y="576" width="180" height="70" fill="#438dd5"/>
    <ellipse cx="420" cy="646" rx="90" ry="14" fill="#438dd5"/>
    <text x="420" y="606" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">PostgreSQL</text>
    <text x="420" y="628" font-size="10" fill="#e8f1fa" text-anchor="middle">[容器] 业务库+审计留痕（ADR-004）</text>
  </g>

  <!-- MinIO -->
  <g>
    <ellipse cx="700" cy="576" rx="90" ry="14" fill="#438dd5"/>
    <rect x="610" y="576" width="180" height="70" fill="#438dd5"/>
    <ellipse cx="700" cy="646" rx="90" ry="14" fill="#438dd5"/>
    <text x="700" y="606" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">MinIO 对象存储</text>
    <text x="700" y="628" font-size="10" fill="#e8f1fa" text-anchor="middle">[容器] 申报材料（S3 协议）</text>
  </g>

  <!-- 外部 -->
  <rect x="950" y="180" width="200" height="80" rx="8" fill="#999999"/>
  <text x="1050" y="214" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">省统一身份认证</text>
  <text x="1050" y="236" font-size="10" fill="#eee" text-anchor="middle">[外部系统]</text>
  <rect x="950" y="380" width="200" height="80" rx="8" fill="#999999"/>
  <text x="1050" y="414" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">政务短信网关</text>
  <text x="1050" y="436" font-size="10" fill="#eee" text-anchor="middle">[外部系统]</text>

  <!-- 连线 -->
  <path d="M 156 190 L 296 190" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#c2arr)"/>
  <text x="226" y="180" font-size="11" fill="#555" text-anchor="middle">HTTPS</text>

  <path d="M 425 248 L 425 306" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#c2arr)"/>
  <text x="500" y="282" font-size="11" fill="#555" text-anchor="middle">JSON / HTTPS（/api/*）</text>

  <path d="M 460 492 L 430 560" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#c2arr)"/>
  <text x="405" y="530" font-size="11" fill="#555" text-anchor="end">SQL（仅经 repo 层）</text>

  <path d="M 680 492 L 700 558" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#c2arr)"/>
  <text x="720" y="530" font-size="11" fill="#555">S3 协议</text>

  <path d="M 844 350 L 946 240" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#c2arr)"/>
  <rect x="850" y="272" width="120" height="18" fill="#fff"/>
  <text x="910" y="286" font-size="11" fill="#555" text-anchor="middle">OIDC 校验令牌</text>

  <path d="M 844 420 L 946 420" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#c2arr)"/>
  <text x="895" y="410" font-size="11" fill="#555" text-anchor="middle">HTTP</text>

  <!-- 图例 -->
  <g>
    <circle cx="316" cy="726" r="7" fill="#08427b"/>
    <text x="332" y="730" font-size="11" fill="#555">人物</text>
    <rect x="392" y="718" width="26" height="16" rx="4" fill="#438dd5"/>
    <text x="426" y="730" font-size="11" fill="#555">容器</text>
    <rect x="490" y="718" width="26" height="16" rx="4" fill="#85bbf0"/>
    <text x="524" y="730" font-size="11" fill="#555">模块（L3 预告，详见工程目录）</text>
    <rect x="740" y="718" width="26" height="16" rx="4" fill="#999999"/>
    <text x="774" y="730" font-size="11" fill="#555">外部系统</text>
    <rect x="884" y="718" width="26" height="16" rx="4" fill="none" stroke="#444" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="918" y="730" font-size="11" fill="#555">系统边界</text>
  </g>
</svg>
