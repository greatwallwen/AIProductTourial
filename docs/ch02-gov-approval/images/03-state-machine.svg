<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">
  <desc>申报单状态机动画：submitted、accepted、supplementing、in_review、approved、concluded 及 not_accepted、denied 两个否定终态；橙色令牌沿合法迁移路径流动（含补正往返）。边名与代码 TRANSITIONS 逐字一致。</desc>
  <defs>
    <marker id="smarr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#555"/>
    </marker>
    <path id="tokenPath" d="M 60 328 L 175 328 L 405 328 L 405 178 L 405 328 L 635 328 L 865 328 L 1085 328"/>
  </defs>

  <text x="40" y="44" font-size="20" font-weight="700" fill="#1a1a1a">申报单状态机（动画：令牌沿合法迁移流动）</text>
  <text x="40" y="70" font-size="13" fill="#666">边名与 src/modules/application/service.ts 的 TRANSITIONS 逐字一致；不在图上的迁移会被拒绝（409 + allowedActions）</text>

  <!-- 初始点 -->
  <circle cx="60" cy="328" r="8" fill="#1a1a1a"/>
  <line x1="68" y1="328" x2="96" y2="328" stroke="#555" stroke-width="1.6" marker-end="url(#smarr)"/>
  <text x="80" y="312" font-size="11" fill="#555" text-anchor="middle" font-family="monospace">submit</text>

  <!-- 主链状态 -->
  <g>
    <rect x="100" y="300" width="150" height="56" rx="10" fill="#f4f6f8" stroke="#8a97a3" stroke-width="1.6"/>
    <text x="175" y="323" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle" font-family="monospace">submitted</text>
    <text x="175" y="344" font-size="11" fill="#777" text-anchor="middle">已提交</text>

    <rect x="330" y="300" width="150" height="56" rx="10" fill="#f4f6f8" stroke="#8a97a3" stroke-width="1.6"/>
    <text x="405" y="323" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle" font-family="monospace">accepted</text>
    <text x="405" y="344" font-size="11" fill="#777" text-anchor="middle">已受理（时限起算）</text>

    <rect x="560" y="300" width="150" height="56" rx="10" fill="#f4f6f8" stroke="#8a97a3" stroke-width="1.6"/>
    <text x="635" y="323" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle" font-family="monospace">in_review</text>
    <text x="635" y="344" font-size="11" fill="#777" text-anchor="middle">审批中</text>

    <rect x="790" y="300" width="150" height="56" rx="10" fill="#f4f6f8" stroke="#8a97a3" stroke-width="1.6"/>
    <text x="865" y="323" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle" font-family="monospace">approved</text>
    <text x="865" y="344" font-size="11" fill="#777" text-anchor="middle">已批准</text>

    <rect x="1010" y="300" width="150" height="56" rx="10" fill="#f0f7f0" stroke="#2e7d32" stroke-width="2.4"/>
    <rect x="1015" y="305" width="140" height="46" rx="7" fill="none" stroke="#2e7d32" stroke-width="1"/>
    <text x="1085" y="323" font-size="13" font-weight="600" fill="#2e7d32" text-anchor="middle" font-family="monospace">concluded</text>
    <text x="1085" y="344" font-size="11" fill="#2e7d32" text-anchor="middle">已办结（发证）</text>
  </g>

  <!-- 补正状态 -->
  <rect x="330" y="150" width="150" height="56" rx="10" fill="#fdf6ec" stroke="#e65100" stroke-width="1.6"/>
  <text x="405" y="173" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle" font-family="monospace">supplementing</text>
  <text x="405" y="194" font-size="11" fill="#777" text-anchor="middle">补正中</text>

  <!-- 否定终态 -->
  <g>
    <rect x="100" y="470" width="150" height="56" rx="10" fill="#fdf0f0" stroke="#c62828" stroke-width="2.4"/>
    <rect x="105" y="475" width="140" height="46" rx="7" fill="none" stroke="#c62828" stroke-width="1"/>
    <text x="175" y="493" font-size="13" font-weight="600" fill="#c62828" text-anchor="middle" font-family="monospace">not_accepted</text>
    <text x="175" y="514" font-size="11" fill="#c62828" text-anchor="middle">不予受理</text>

    <rect x="560" y="470" width="150" height="56" rx="10" fill="#fdf0f0" stroke="#c62828" stroke-width="2.4"/>
    <rect x="565" y="475" width="140" height="46" rx="7" fill="none" stroke="#c62828" stroke-width="1"/>
    <text x="635" y="493" font-size="13" font-weight="600" fill="#c62828" text-anchor="middle" font-family="monospace">denied</text>
    <text x="635" y="514" font-size="11" fill="#c62828" text-anchor="middle">不予通过</text>
  </g>

  <!-- 主链边 -->
  <line x1="252" y1="328" x2="326" y2="328" stroke="#555" stroke-width="1.6" marker-end="url(#smarr)"/>
  <text x="289" y="316" font-size="11" fill="#555" text-anchor="middle" font-family="monospace">accept</text>
  <line x1="482" y1="328" x2="556" y2="328" stroke="#555" stroke-width="1.6" marker-end="url(#smarr)"/>
  <text x="519" y="316" font-size="11" fill="#555" text-anchor="middle" font-family="monospace">start_review</text>
  <line x1="712" y1="328" x2="786" y2="328" stroke="#555" stroke-width="1.6" marker-end="url(#smarr)"/>
  <text x="749" y="316" font-size="11" fill="#555" text-anchor="middle" font-family="monospace">approve</text>
  <line x1="942" y1="328" x2="1006" y2="328" stroke="#555" stroke-width="1.6" marker-end="url(#smarr)"/>
  <text x="974" y="316" font-size="11" fill="#555" text-anchor="middle" font-family="monospace">conclude</text>

  <!-- 补正往返 -->
  <line x1="380" y1="300" x2="380" y2="210" stroke="#555" stroke-width="1.6" marker-end="url(#smarr)"/>
  <text x="372" y="258" font-size="11" fill="#555" text-anchor="end" font-family="monospace">request_supplement</text>
  <line x1="430" y1="206" x2="430" y2="296" stroke="#555" stroke-width="1.6" marker-end="url(#smarr)"/>
  <text x="438" y="258" font-size="11" fill="#555" font-family="monospace">resubmit</text>

  <!-- 否定边 -->
  <line x1="175" y1="358" x2="175" y2="466" stroke="#c62828" stroke-width="1.6" marker-end="url(#smarr)"/>
  <text x="183" y="416" font-size="11" fill="#c62828" font-family="monospace">reject_accept</text>
  <line x1="635" y1="358" x2="635" y2="466" stroke="#c62828" stroke-width="1.6" marker-end="url(#smarr)"/>
  <text x="643" y="416" font-size="11" fill="#c62828" font-family="monospace">deny</text>

  <!-- 动画令牌：走一遍含补正往返的完整合法链路 -->
  <circle r="7" fill="#e65100" opacity="0">
    <animateMotion dur="12s" begin="0.5s" repeatCount="indefinite">
      <mpath href="#tokenPath"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.03;0.95;1" dur="12s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- 说明与图例 -->
  <text x="40" y="596" font-size="12" fill="#555">终态（双框）不出现在任何边的起点——办结/否定后的任何动作都会得到 409，无需一行防御代码。</text>
  <g>
    <rect x="700" y="612" width="24" height="15" rx="4" fill="#f4f6f8" stroke="#8a97a3" stroke-width="1.5"/>
    <text x="732" y="624" font-size="11" fill="#555">状态</text>
    <rect x="786" y="612" width="24" height="15" rx="4" fill="#f0f7f0" stroke="#2e7d32" stroke-width="2"/>
    <text x="818" y="624" font-size="11" fill="#555">正常终态</text>
    <rect x="892" y="612" width="24" height="15" rx="4" fill="#fdf0f0" stroke="#c62828" stroke-width="2"/>
    <text x="924" y="624" font-size="11" fill="#555">否定终态</text>
    <circle cx="1010" cy="620" r="6" fill="#e65100"/>
    <text x="1024" y="624" font-size="11" fill="#555">流转令牌（动画）</text>
  </g>
</svg>
