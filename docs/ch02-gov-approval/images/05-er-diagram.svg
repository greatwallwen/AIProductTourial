<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">
  <desc>案例一核心 ER 图：catalog_items（规则的家）1对多 applications（状态的家），applications 1对多 application_materials 与 approval_logs（审计的家，只增不改）；apply_seq 为同事务发号器。</desc>
  <defs>
    <marker id="erarr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#555"/>
    </marker>
  </defs>

  <text x="40" y="44" font-size="20" font-weight="700" fill="#1a1a1a">核心 ER 图：规则、状态、审计各得其所</text>
  <text x="40" y="70" font-size="13" fill="#666">建表 SQL（migrations/001_init.sql）是最终事实，图只画核心列；表名列名与工程逐字一致</text>

  <!-- catalog_items -->
  <g>
    <rect x="60" y="140" width="270" height="196" rx="8" fill="#fff" stroke="#8a97a3" stroke-width="1.5"/>
    <rect x="60" y="140" width="270" height="36" rx="8" fill="#438dd5"/>
    <rect x="60" y="162" width="270" height="14" fill="#438dd5"/>
    <text x="195" y="164" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">catalog_items · 事项目录</text>
    <g font-size="12" fill="#333" font-family="monospace">
      <text x="76" y="200">id            PK</text>
      <text x="76" y="222">item_code     UQ</text>
      <text x="76" y="244">item_name / item_type</text>
      <text x="76" y="266">legal_days / promise_days</text>
      <text x="76" y="288">required_materials JSON</text>
    </g>
    <text x="76" y="318" font-size="11" fill="#2e7d32">规则的家（ADR-002）</text>
  </g>

  <!-- applications -->
  <g>
    <rect x="450" y="120" width="290" height="262" rx="8" fill="#fff" stroke="#8a97a3" stroke-width="1.5"/>
    <rect x="450" y="120" width="290" height="36" rx="8" fill="#1168bd"/>
    <rect x="450" y="142" width="290" height="14" fill="#1168bd"/>
    <text x="595" y="144" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">applications · 申报单</text>
    <g font-size="12" fill="#333" font-family="monospace">
      <text x="466" y="180">id           PK</text>
      <text x="466" y="202">apply_no     UQ</text>
      <text x="466" y="224">item_id      FK</text>
      <text x="466" y="246">applicant_name</text>
      <text x="466" y="268">applicant_id_no（脱敏）</text>
      <text x="466" y="290">status（状态机管辖）</text>
      <text x="466" y="312">submitted/accepted/concluded_at</text>
      <text x="466" y="334">licence_no</text>
    </g>
    <text x="466" y="364" font-size="11" fill="#e65100">状态的家：可变列压到最少</text>
  </g>

  <!-- application_materials -->
  <g>
    <rect x="860" y="120" width="290" height="152" rx="8" fill="#fff" stroke="#8a97a3" stroke-width="1.5"/>
    <rect x="860" y="120" width="290" height="36" rx="8" fill="#438dd5"/>
    <rect x="860" y="142" width="290" height="14" fill="#438dd5"/>
    <text x="1005" y="144" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">application_materials · 材料</text>
    <g font-size="12" fill="#333" font-family="monospace">
      <text x="876" y="180">id             PK</text>
      <text x="876" y="202">application_id FK</text>
      <text x="876" y="224">material_name</text>
      <text x="876" y="246">file_ref（对象存储引用）</text>
    </g>
  </g>

  <!-- approval_logs -->
  <g>
    <rect x="860" y="330" width="290" height="218" rx="8" fill="#fff" stroke="#c62828" stroke-width="1.8"/>
    <rect x="860" y="330" width="290" height="36" rx="8" fill="#c62828"/>
    <rect x="860" y="352" width="290" height="14" fill="#c62828"/>
    <text x="1005" y="354" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">approval_logs · 审计留痕</text>
    <g font-size="12" fill="#333" font-family="monospace">
      <text x="876" y="390">id             PK</text>
      <text x="876" y="412">application_id FK</text>
      <text x="876" y="434">action</text>
      <text x="876" y="456">from_status → to_status</text>
      <text x="876" y="478">operator / opinion</text>
      <text x="876" y="500">created_at</text>
    </g>
    <text x="876" y="530" font-size="11" fill="#c62828" font-weight="600">只增不改（Q-02）：应用层无 UPDATE/DELETE 路径</text>
  </g>

  <!-- apply_seq -->
  <g>
    <rect x="60" y="420" width="270" height="120" rx="8" fill="#f4f6f8" stroke="#8a97a3" stroke-width="1.5"/>
    <rect x="60" y="420" width="270" height="36" rx="8" fill="#8a97a3"/>
    <rect x="60" y="442" width="270" height="14" fill="#8a97a3"/>
    <text x="195" y="444" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">apply_seq · 发号器</text>
    <g font-size="12" fill="#333" font-family="monospace">
      <text x="76" y="482">day  PK（YYYYMMDD）</text>
      <text x="76" y="504">seq</text>
    </g>
    <text x="76" y="528" font-size="11" fill="#555">与建单同事务 UPSERT，保证不重号</text>
  </g>

  <!-- 关系线 -->
  <line x1="332" y1="238" x2="446" y2="238" stroke="#555" stroke-width="1.6" marker-end="url(#erarr)"/>
  <text x="344" y="228" font-size="11" fill="#555">1</text>
  <text x="428" y="228" font-size="11" fill="#555">N</text>
  <rect x="348" y="242" width="86" height="17" fill="#fff"/>
  <text x="391" y="255" font-size="11" fill="#555" text-anchor="middle">被申报</text>

  <line x1="742" y1="200" x2="856" y2="200" stroke="#555" stroke-width="1.6" marker-end="url(#erarr)"/>
  <text x="752" y="190" font-size="11" fill="#555">1</text>
  <text x="840" y="190" font-size="11" fill="#555">N</text>

  <path d="M 742 340 L 800 340 L 800 440 L 856 440" fill="none" stroke="#c62828" stroke-width="1.6" marker-end="url(#erarr)"/>
  <text x="752" y="330" font-size="11" fill="#555">1</text>
  <text x="838" y="430" font-size="11" fill="#555">N</text>
  <rect x="748" y="388" width="104" height="17" fill="#fff"/>
  <text x="800" y="401" font-size="11" fill="#c62828" text-anchor="middle">每次流转一条</text>

  <path d="M 330 480 L 400 480 L 400 386" fill="none" stroke="#8a97a3" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#erarr)"/>
  <text x="410" y="440" font-size="11" fill="#777">同事务取号</text>

  <!-- 图例 -->
  <g>
    <rect x="700" y="590" width="24" height="15" rx="4" fill="#fff" stroke="#8a97a3" stroke-width="1.5"/>
    <text x="732" y="602" font-size="11" fill="#555">业务实体</text>
    <rect x="812" y="590" width="24" height="15" rx="4" fill="#fff" stroke="#c62828" stroke-width="1.8"/>
    <text x="844" y="602" font-size="11" fill="#555">审计实体（只增不改）</text>
    <line x1="990" y1="597" x2="1022" y2="597" stroke="#555" stroke-width="1.6" marker-end="url(#erarr)"/>
    <text x="1030" y="602" font-size="11" fill="#555">1 : N 关系</text>
  </g>
</svg>
