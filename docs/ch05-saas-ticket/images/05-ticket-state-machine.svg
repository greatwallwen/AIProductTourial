<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">
  <desc>工单状态机：open、in_progress、resolved、closed；resolved 可 reopen 回 in_progress；边名与工程 TRANSITIONS 逐字一致。</desc>
  <defs>
    <marker id="tkarr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#555"/>
    </marker>
  </defs>

  <text x="40" y="44" font-size="20" font-weight="700" fill="#1a1a1a">工单状态机</text>
  <text x="40" y="70" font-size="13" fill="#666">与案例一同款手法：as const 迁移表；非法迁移 409 + allowedActions（实录：open 直接 close 被拒）</text>

  <circle cx="80" cy="210" r="8" fill="#1a1a1a"/>
  <line x1="88" y1="210" x2="126" y2="210" stroke="#555" stroke-width="1.6" marker-end="url(#tkarr)"/>
  <text x="107" y="196" font-size="11" fill="#555" text-anchor="middle">创建</text>

  <rect x="130" y="180" width="170" height="60" rx="10" fill="#f4f6f8" stroke="#8a97a3" stroke-width="1.6"/>
  <text x="215" y="206" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle" font-family="monospace">open</text>
  <text x="215" y="228" font-size="11" fill="#777" text-anchor="middle">新建（SLA 计时开始）</text>

  <rect x="410" y="180" width="170" height="60" rx="10" fill="#fdf6ec" stroke="#e65100" stroke-width="1.6"/>
  <text x="495" y="206" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle" font-family="monospace">in_progress</text>
  <text x="495" y="228" font-size="11" fill="#777" text-anchor="middle">处理中</text>

  <rect x="690" y="180" width="170" height="60" rx="10" fill="#f0f7f0" stroke="#2e7d32" stroke-width="1.6"/>
  <text x="775" y="206" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle" font-family="monospace">resolved</text>
  <text x="775" y="228" font-size="11" fill="#777" text-anchor="middle">已解决（SLA 计时取消）</text>

  <rect x="970" y="180" width="170" height="60" rx="10" fill="#f4f6f8" stroke="#8a97a3" stroke-width="2.4"/>
  <rect x="975" y="185" width="160" height="50" rx="7" fill="none" stroke="#8a97a3" stroke-width="1"/>
  <text x="1055" y="206" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle" font-family="monospace">closed</text>
  <text x="1055" y="228" font-size="11" fill="#777" text-anchor="middle">已关闭（终态）</text>

  <line x1="302" y1="210" x2="406" y2="210" stroke="#555" stroke-width="1.6" marker-end="url(#tkarr)"/>
  <text x="354" y="198" font-size="11" fill="#555" text-anchor="middle" font-family="monospace">start</text>
  <line x1="582" y1="210" x2="686" y2="210" stroke="#555" stroke-width="1.6" marker-end="url(#tkarr)"/>
  <text x="634" y="198" font-size="11" fill="#555" text-anchor="middle" font-family="monospace">resolve</text>
  <line x1="862" y1="210" x2="966" y2="210" stroke="#555" stroke-width="1.6" marker-end="url(#tkarr)"/>
  <text x="914" y="198" font-size="11" fill="#555" text-anchor="middle" font-family="monospace">close</text>

  <path d="M 730 244 C 680 330 590 330 540 246" fill="none" stroke="#e65100" stroke-width="1.6" marker-end="url(#tkarr)"/>
  <text x="635" y="330" font-size="11" fill="#e65100" text-anchor="middle" font-family="monospace">reopen（客户不满意重开，SLA 重新投递）</text>

  <!-- 图例 -->
  <g>
    <rect x="760" y="416" width="24" height="15" rx="4" fill="#f4f6f8" stroke="#8a97a3" stroke-width="1.5"/>
    <text x="792" y="428" font-size="11" fill="#555">状态</text>
    <rect x="848" y="416" width="24" height="15" rx="4" fill="#f4f6f8" stroke="#8a97a3" stroke-width="2.2"/>
    <text x="880" y="428" font-size="11" fill="#555">终态（双框）</text>
    <line x1="980" y1="423" x2="1012" y2="423" stroke="#e65100" stroke-width="1.6"/>
    <text x="1020" y="428" font-size="11" fill="#555">回边（重开）</text>
  </g>
</svg>
