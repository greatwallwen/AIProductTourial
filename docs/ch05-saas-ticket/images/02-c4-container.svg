<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">
  <desc>案例四 C4 容器图：负载均衡后 API 单体多实例（无状态），Worker 进程消费 BullMQ 队列，PostgreSQL（RLS）、Redis、对象存储；API 与 Worker 之间只经 Redis 交接。</desc>
  <defs>
    <marker id="s2arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#555"/>
    </marker>
  </defs>

  <text x="40" y="44" font-size="20" font-weight="700" fill="#1a1a1a">C4 · L2 容器图：云原生的单体</text>
  <text x="40" y="70" font-size="13" fill="#666">仍是单体（一个仓库、共享领域代码），但形态是无状态 ×N + Worker——API 与 Worker 不直接通信，Redis 是唯一交接点</text>

  <!-- 用户 -->
  <g>
    <circle cx="90" cy="200" r="13" fill="#08427b"/>
    <path d="M 64 242 Q 90 212 116 242 L 116 254 L 64 254 Z" fill="#08427b"/>
    <text x="90" y="276" font-size="11" font-weight="600" fill="#1a1a1a" text-anchor="middle">租户用户</text>
  </g>

  <!-- LB -->
  <rect x="170" y="170" width="120" height="80" rx="8" fill="#438dd5"/>
  <text x="230" y="204" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">负载均衡</text>
  <text x="230" y="226" font-size="10" fill="#e8f1fa" text-anchor="middle">通配符证书</text>

  <!-- 边界 -->
  <rect x="330" y="100" width="600" height="610" rx="12" fill="none" stroke="#444" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="346" y="126" font-size="12" fill="#444">SaaS 工单系统 [系统边界]</text>

  <!-- API xN -->
  <g>
    <rect x="392" y="176" width="230" height="120" rx="8" fill="#85bbf0"/>
    <rect x="378" y="162" width="230" height="120" rx="8" fill="#5f9fd8"/>
    <rect x="364" y="148" width="230" height="120" rx="8" fill="#438dd5"/>
    <text x="479" y="182" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">API 单体 × N</text>
    <text x="479" y="204" font-size="10" fill="#e8f1fa" text-anchor="middle">[容器：Node.js/Fastify · 无状态]</text>
    <text x="479" y="226" font-size="10" fill="#e8f1fa" text-anchor="middle">tenant 鉴权作用域 · ticket 状态机</text>
    <text x="479" y="246" font-size="10" fill="#e8f1fa" text-anchor="middle">订阅/计费 · 只投递任务不执行</text>
  </g>

  <!-- Worker -->
  <rect x="680" y="148" width="210" height="134" rx="8" fill="#438dd5"/>
  <text x="785" y="180" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">Worker × M</text>
  <text x="785" y="202" font-size="10" fill="#e8f1fa" text-anchor="middle">[容器：Node.js · BullMQ 消费者]</text>
  <text x="785" y="224" font-size="10" fill="#e8f1fa" text-anchor="middle">SLA 到期升级 · Webhook 投递</text>
  <text x="785" y="244" font-size="10" fill="#e8f1fa" text-anchor="middle">邮件解析 · 与 API 分开伸缩</text>

  <!-- Redis -->
  <g>
    <ellipse cx="785" cy="370" rx="85" ry="12" fill="#438dd5"/>
    <rect x="700" y="370" width="170" height="64" fill="#438dd5"/>
    <ellipse cx="785" cy="434" rx="85" ry="12" fill="#438dd5"/>
    <text x="785" y="398" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">Redis（托管）</text>
    <text x="785" y="420" font-size="10" fill="#e8f1fa" text-anchor="middle">BullMQ 队列 · 延迟任务</text>
  </g>

  <!-- PG -->
  <g>
    <ellipse cx="479" cy="370" rx="95" ry="12" fill="#438dd5"/>
    <rect x="384" y="370" width="190" height="72" fill="#438dd5"/>
    <ellipse cx="479" cy="442" rx="95" ry="12" fill="#438dd5"/>
    <text x="479" y="398" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">PostgreSQL（托管）</text>
    <text x="479" y="418" font-size="10" fill="#e8f1fa" text-anchor="middle">pool 模型 + RLS 兜底</text>
    <text x="479" y="436" font-size="10" fill="#e8f1fa" text-anchor="middle">tenant_id 联合索引</text>
  </g>

  <!-- 对象存储 -->
  <rect x="384" y="520" width="190" height="70" rx="8" fill="#438dd5"/>
  <text x="479" y="550" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">对象存储（托管）</text>
  <text x="479" y="572" font-size="10" fill="#e8f1fa" text-anchor="middle">附件（键含 tenant 前缀）</text>

  <!-- 外部 -->
  <rect x="980" y="180" width="180" height="70" rx="8" fill="#999999" stroke="#e65100" stroke-width="1.6"/>
  <text x="1070" y="210" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">租户 Webhook 端点</text>
  <text x="1070" y="232" font-size="10" fill="#eee" text-anchor="middle">[外部 · 不受控]</text>

  <!-- 连线 -->
  <line x1="122" y1="212" x2="166" y2="212" stroke="#555" stroke-width="1.6" marker-end="url(#s2arr)"/>
  <line x1="290" y1="210" x2="360" y2="210" stroke="#555" stroke-width="1.6" marker-end="url(#s2arr)"/>
  <text x="325" y="200" font-size="10" fill="#555" text-anchor="middle">HTTPS</text>
  <path d="M 479 270 L 479 356" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#s2arr)"/>
  <text x="470" y="336" font-size="10" fill="#555" text-anchor="end">SQL · 事务级 set_config</text>
  <path d="M 594 250 L 700 380" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#s2arr)"/>
  <rect x="596" y="308" width="110" height="17" fill="#fff"/>
  <text x="651" y="321" font-size="10" fill="#555" text-anchor="middle">投递任务（delay/取消）</text>
  <path d="M 785 284 L 785 356" fill="none" stroke="#555" stroke-width="1.6" marker-start="url(#s2arr)"/>
  <text x="800" y="324" font-size="10" fill="#555">竞争消费</text>
  <path d="M 700 220 L 594 220" fill="none" stroke="#c62828" stroke-width="1.2" stroke-dasharray="3 4"/>
  <text x="647" y="208" font-size="10" fill="#c62828" text-anchor="middle">无直接调用</text>
  <path d="M 890 200 L 976 208" fill="none" stroke="#e65100" stroke-width="1.6" marker-end="url(#s2arr)"/>
  <text x="935" y="192" font-size="10" fill="#e65100" text-anchor="middle">签名推送+重试</text>
  <path d="M 730 286 L 560 524" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#s2arr)"/>
  <rect x="612" y="440" width="80" height="17" fill="#fff"/>
  <text x="652" y="453" font-size="10" fill="#555" text-anchor="middle">读写附件</text>

  <!-- 图例 -->
  <g>
    <circle cx="366" cy="736" r="7" fill="#08427b"/>
    <text x="382" y="740" font-size="11" fill="#555">人物</text>
    <rect x="442" y="728" width="26" height="16" rx="4" fill="#438dd5"/>
    <text x="476" y="740" font-size="11" fill="#555">容器（多层叠 = 多实例）</text>
    <rect x="668" y="728" width="26" height="16" rx="4" fill="#999999"/>
    <text x="702" y="740" font-size="11" fill="#555">外部</text>
    <line x1="770" y1="736" x2="802" y2="736" stroke="#c62828" stroke-width="1.2" stroke-dasharray="3 4"/>
    <text x="810" y="740" font-size="11" fill="#555">禁止直接调用</text>
  </g>
</svg>
