<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">
  <desc>动画：请求隔离链路——SUPABASE 的合法请求依次通过租户识别、身份一致性、repo 层 tenant_id 过滤、RLS 兜底四道关卡取到数据；PRISMA 的凭证访问 SUPABASE 资源在 repo 过滤处被拦截返回 404。</desc>
  <defs>
    <marker id="isarr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#999"/>
    </marker>
    <path id="okPath" d="M 120 280 L 1030 280"/>
    <path id="badPath" d="M 120 400 L 660 400 L 720 520"/>
  </defs>

  <text x="40" y="44" font-size="20" font-weight="700" fill="#1a1a1a">隔离纵深：一次请求的四道关卡（动画）</text>
  <text x="40" y="70" font-size="13" fill="#666">绿色＝SUPABASE 凭证访问自家工单；红色＝PRISMA 凭证访问 SUPABASE-0001——同一 URL，两种命运（实录见 5.3 节）</text>

  <!-- 轨道 -->
  <use href="#okPath" fill="none" stroke="#e3ebe3" stroke-width="4"/>
  <use href="#badPath" fill="none" stroke="#f3e3e3" stroke-width="4"/>

  <!-- 起点 -->
  <rect x="40" y="250" width="130" height="60" rx="8" fill="#f0f7f0" stroke="#2e7d32" stroke-width="1.6"/>
  <text x="105" y="276" font-size="12" font-weight="600" fill="#2e7d32" text-anchor="middle">SUPABASE 请求</text>
  <text x="105" y="296" font-size="10" fill="#2e7d32" text-anchor="middle">GET …/SUPABASE-0001</text>
  <rect x="40" y="370" width="130" height="60" rx="8" fill="#fdf0f0" stroke="#c62828" stroke-width="1.6"/>
  <text x="105" y="396" font-size="12" font-weight="600" fill="#c62828" text-anchor="middle">PRISMA 请求</text>
  <text x="105" y="416" font-size="10" fill="#c62828" text-anchor="middle">GET …/SUPABASE-0001</text>

  <!-- 四道关卡 -->
  <g>
    <rect x="240" y="180" width="120" height="290" rx="10" fill="#eef3f8" stroke="#8a97a3" stroke-width="1.5"/>
    <text x="300" y="210" font-size="12.5" font-weight="600" fill="#1a1a1a" text-anchor="middle">① 租户识别</text>
    <text x="300" y="232" font-size="10" fill="#555" text-anchor="middle">API Key → sha256</text>
    <text x="300" y="250" font-size="10" fill="#555" text-anchor="middle">生产：子域名+JWT</text>
    <text x="300" y="500" font-size="10" fill="#777" text-anchor="middle">鉴权钩子（作用域）</text>

    <rect x="440" y="180" width="120" height="290" rx="10" fill="#eef3f8" stroke="#8a97a3" stroke-width="1.5"/>
    <text x="500" y="210" font-size="12.5" font-weight="600" fill="#1a1a1a" text-anchor="middle">② 身份一致性</text>
    <text x="500" y="232" font-size="10" fill="#555" text-anchor="middle">claim 与声称租户</text>
    <text x="500" y="250" font-size="10" fill="#555" text-anchor="middle">必须一致（ADR-003）</text>
    <text x="500" y="500" font-size="10" fill="#777" text-anchor="middle">上下文注入 req.tenant</text>

    <rect x="640" y="180" width="120" height="290" rx="10" fill="#fdf6ec" stroke="#e65100" stroke-width="2.4"/>
    <text x="700" y="210" font-size="12.5" font-weight="600" fill="#e65100" text-anchor="middle">③ repo 强制</text>
    <text x="700" y="232" font-size="10" fill="#555" text-anchor="middle" font-family="monospace">tenant_id = ?</text>
    <text x="700" y="250" font-size="10" fill="#555" text-anchor="middle">守护测试第4条扫描</text>
    <text x="700" y="500" font-size="10" fill="#777" text-anchor="middle">主防线（应用层）</text>

    <rect x="840" y="180" width="120" height="290" rx="10" fill="#eef3f8" stroke="#8a97a3" stroke-width="1.5" stroke-dasharray="7 4"/>
    <text x="900" y="210" font-size="12.5" font-weight="600" fill="#1a1a1a" text-anchor="middle">④ RLS 兜底</text>
    <text x="900" y="232" font-size="10" fill="#555" text-anchor="middle" font-family="monospace">set_config(…,true)</text>
    <text x="900" y="250" font-size="10" fill="#555" text-anchor="middle">事务级（连接池坑）</text>
    <text x="900" y="500" font-size="10" fill="#777" text-anchor="middle">生产兜底（PG POLICY）</text>
  </g>

  <!-- 终点 -->
  <rect x="1030" y="246" width="130" height="68" rx="8" fill="#f0f7f0" stroke="#2e7d32" stroke-width="2"/>
  <text x="1095" y="274" font-size="12" font-weight="600" fill="#2e7d32" text-anchor="middle">HTTP 200</text>
  <text x="1095" y="296" font-size="10" fill="#2e7d32" text-anchor="middle">SUPABASE-0001 数据</text>

  <rect x="660" y="520" width="150" height="64" rx="8" fill="#fdf0f0" stroke="#c62828" stroke-width="2"/>
  <text x="735" y="546" font-size="13" font-weight="700" fill="#c62828" text-anchor="middle">HTTP 404</text>
  <text x="735" y="568" font-size="10" fill="#c62828" text-anchor="middle">不泄露资源存在性</text>

  <!-- 动画粒子 -->
  <circle r="7" fill="#2e7d32" opacity="0">
    <animateMotion dur="6s" begin="0.3s" repeatCount="indefinite" keyPoints="0;1;1" keyTimes="0;0.75;1" calcMode="linear">
      <mpath href="#okPath"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.75;0.82" dur="6s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle r="7" fill="#c62828" opacity="0">
    <animateMotion dur="6s" begin="1.3s" repeatCount="indefinite" keyPoints="0;1;1" keyTimes="0;0.75;1" calcMode="linear">
      <mpath href="#badPath"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.75;0.82" dur="6s" begin="1.3s" repeatCount="indefinite"/>
  </circle>

  <!-- 拦截标记（红叉在关卡③的红色通道处） -->
  <g stroke="#c62828" stroke-width="3">
    <line x1="688" y1="388" x2="712" y2="412"/>
    <line x1="712" y1="388" x2="688" y2="412"/>
  </g>
  <text x="700" y="440" font-size="10.5" fill="#c62828" text-anchor="middle">WHERE tenant_id=PRISMA</text>
  <text x="700" y="456" font-size="10.5" fill="#c62828" text-anchor="middle">查无此单 → 404</text>

  <!-- 底部结论 -->
  <text x="600" y="628" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">两道独立防线（③④）任何一道单独失效都不导致串租；404 而非 403——半行代码的安全基本功</text>

  <!-- 图例 -->
  <g>
    <circle cx="766" cy="662" r="6" fill="#2e7d32"/>
    <text x="780" y="666" font-size="11" fill="#555">合法请求</text>
    <circle cx="866" cy="662" r="6" fill="#c62828"/>
    <text x="880" y="666" font-size="11" fill="#555">跨租户请求</text>
    <rect x="978" y="654" width="24" height="15" rx="4" fill="#eef3f8" stroke="#8a97a3" stroke-width="1.3" stroke-dasharray="7 4"/>
    <text x="1010" y="666" font-size="11" fill="#555">生产设计</text>
  </g>
</svg>
