<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">
  <desc>多租户三种数据模型对比：Silo 每租户独立数据库、Schema-per-tenant 同库独立模式、Pool 共享表加 tenant_id 列；本案例采纳 Pool。术语出处为 AWS SaaS Lens 与微软 Azure 架构中心。</desc>

  <text x="40" y="44" font-size="20" font-weight="700" fill="#1a1a1a">多租户三模型：隔离强度换成本结构</text>
  <text x="40" y="70" font-size="13" fill="#666">术语：AWS Well-Architected SaaS Lens（Silo/Pool）、微软 Azure 架构中心多租户指南；选型依据＝租户画像 × 成本，不是"哪个最强"</text>

  <!-- Silo -->
  <g>
    <rect x="40" y="100" width="350" height="470" rx="12" fill="#fff" stroke="#8a97a3" stroke-width="1.5"/>
    <rect x="40" y="100" width="350" height="44" rx="12" fill="#8a97a3"/>
    <rect x="40" y="124" width="350" height="20" fill="#8a97a3"/>
    <text x="215" y="129" font-size="15" font-weight="600" fill="#fff" text-anchor="middle">Silo · 每租户独立数据库</text>
    <g>
      <ellipse cx="115" cy="180" rx="48" ry="9" fill="#438dd5"/>
      <rect x="67" y="180" width="96" height="46" fill="#438dd5"/>
      <ellipse cx="115" cy="226" rx="48" ry="9" fill="#438dd5"/>
      <text x="115" y="208" font-size="10" fill="#fff" text-anchor="middle">租户A 库</text>
      <ellipse cx="215" cy="180" rx="48" ry="9" fill="#438dd5"/>
      <rect x="167" y="180" width="96" height="46" fill="#438dd5"/>
      <ellipse cx="215" cy="226" rx="48" ry="9" fill="#438dd5"/>
      <text x="215" y="208" font-size="10" fill="#fff" text-anchor="middle">租户B 库</text>
      <ellipse cx="315" cy="180" rx="48" ry="9" fill="#438dd5"/>
      <rect x="267" y="180" width="96" height="46" fill="#438dd5"/>
      <ellipse cx="315" cy="226" rx="48" ry="9" fill="#438dd5"/>
      <text x="315" y="208" font-size="10" fill="#fff" text-anchor="middle">租户C 库</text>
    </g>
    <g font-size="12" fill="#333">
      <text x="64" y="286">隔离：物理级（最强）</text>
      <text x="64" y="314">成本：连接池/备份/迁移 × N</text>
      <text x="64" y="342" fill="#c62828">1000 租户 = 1000 个库要迁移；</text>
      <text x="64" y="364" fill="#c62828">连接数在单实例上不可行</text>
      <text x="64" y="398">开通：建库+迁移+配置（分钟级，</text>
      <text x="64" y="420">与 C-02 自助秒开冲突）</text>
    </g>
    <rect x="64" y="480" width="302" height="60" rx="8" fill="#eef3f8"/>
    <text x="215" y="505" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">适用画像</text>
    <text x="215" y="527" font-size="11.5" fill="#555" text-anchor="middle">数十个高价值/强合规大客户（B2B）</text>
  </g>

  <!-- Schema -->
  <g>
    <rect x="425" y="100" width="350" height="470" rx="12" fill="#fff" stroke="#8a97a3" stroke-width="1.5"/>
    <rect x="425" y="100" width="350" height="44" rx="12" fill="#8a97a3"/>
    <rect x="425" y="124" width="350" height="20" fill="#8a97a3"/>
    <text x="600" y="129" font-size="15" font-weight="600" fill="#fff" text-anchor="middle">Schema-per-tenant · 同库独立模式</text>
    <g>
      <ellipse cx="600" cy="172" rx="130" ry="11" fill="#438dd5"/>
      <rect x="470" y="172" width="260" height="66" fill="#438dd5"/>
      <ellipse cx="600" cy="238" rx="130" ry="11" fill="#438dd5"/>
      <rect x="486" y="184" width="70" height="42" rx="5" fill="#85bbf0"/>
      <text x="521" y="209" font-size="10" fill="#1a1a1a" text-anchor="middle">schema_a</text>
      <rect x="566" y="184" width="70" height="42" rx="5" fill="#85bbf0"/>
      <text x="601" y="209" font-size="10" fill="#1a1a1a" text-anchor="middle">schema_b</text>
      <rect x="646" y="184" width="70" height="42" rx="5" fill="#85bbf0"/>
      <text x="681" y="209" font-size="10" fill="#1a1a1a" text-anchor="middle">schema_c</text>
    </g>
    <g font-size="12" fill="#333">
      <text x="449" y="286">隔离：逻辑强（命名空间级）</text>
      <text x="449" y="314">成本：连接可共享，但——</text>
      <text x="449" y="342" fill="#c62828">迁移仍 × N；数万 schema 下</text>
      <text x="449" y="364" fill="#c62828">PG 目录表退化、备份复杂化</text>
      <text x="449" y="398">开通：建 schema + 迁移（秒级，</text>
      <text x="449" y="420">但迁移风险面随 N 增长）</text>
    </g>
    <rect x="449" y="480" width="302" height="60" rx="8" fill="#eef3f8"/>
    <text x="600" y="505" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">适用画像</text>
    <text x="600" y="527" font-size="11.5" fill="#555" text-anchor="middle">数百租户内的中间态（迁移纪律强的团队）</text>
  </g>

  <!-- Pool（采纳） -->
  <g>
    <rect x="810" y="100" width="350" height="470" rx="12" fill="#fff" stroke="#e65100" stroke-width="3"/>
    <rect x="810" y="100" width="350" height="44" rx="12" fill="#e65100"/>
    <rect x="810" y="124" width="350" height="20" fill="#e65100"/>
    <text x="985" y="129" font-size="15" font-weight="600" fill="#fff" text-anchor="middle">Pool · 共享表 + tenant_id ✓ 采纳</text>
    <g>
      <ellipse cx="985" cy="172" rx="130" ry="11" fill="#438dd5"/>
      <rect x="855" y="172" width="260" height="66" fill="#438dd5"/>
      <ellipse cx="985" cy="238" rx="130" ry="11" fill="#438dd5"/>
      <g font-size="10" font-family="monospace">
        <text x="874" y="192" fill="#fff" font-weight="600">tenant_id  ticket_no   title…</text>
        <text x="874" y="209" fill="#ffe0b2">SUPABASE   0001        Database Lost…</text>
        <text x="874" y="224" fill="#cfe3f7">PRISMA     0001        db pull…</text>
        <text x="874" y="239" fill="#ffe0b2">SUPABASE   0002        Stale metadata…</text>
      </g>
    </g>
    <g font-size="12" fill="#333">
      <text x="834" y="286">隔离：机制级（→ 双保险 ADR-002）</text>
      <text x="834" y="314" fill="#2e7d32">成本：一张表、一次迁移、一份备份</text>
      <text x="834" y="342" fill="#2e7d32">开通＝一个事务（工程实录：</text>
      <text x="834" y="364" fill="#2e7d32">注册即返回凭证，立即可建单）</text>
      <text x="834" y="398">代价：隔离依赖机制而非物理；</text>
      <text x="834" y="420">吵闹邻居需限流治理（演进表）</text>
    </g>
    <rect x="834" y="480" width="302" height="60" rx="8" fill="#fdf6ec"/>
    <text x="985" y="505" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">适用画像（＝本案例）</text>
    <text x="985" y="527" font-size="11.5" fill="#555" text-anchor="middle">自助注册的长尾中小客户</text>
  </g>

  <text x="600" y="618" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">演进路径（E-03）：pool 起步；签约强合规大客户时为其单独 silo 部署——tenant_id 机制在单租户库依然成立，代码零改</text>

  <!-- 图例 -->
  <g>
    <rect x="880" y="650" width="26" height="16" rx="4" fill="#438dd5"/>
    <text x="914" y="662" font-size="11" fill="#555">数据库</text>
    <rect x="984" y="650" width="26" height="16" rx="4" fill="#85bbf0"/>
    <text x="1018" y="662" font-size="11" fill="#555">schema / 行</text>
  </g>
</svg>
