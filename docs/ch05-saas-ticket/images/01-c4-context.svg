<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">
  <desc>案例四 C4 系统上下文图：租户管理员、客服、终端客户使用 SaaS 工单系统；对接邮件服务、支付网关；向租户自己的系统推送 Webhook——首次出现不受控的外部推送目标。</desc>
  <defs>
    <marker id="s1arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#555"/>
    </marker>
  </defs>

  <text x="40" y="44" font-size="20" font-weight="700" fill="#1a1a1a">C4 · L1 系统上下文：SaaS 工单系统</text>
  <text x="40" y="70" font-size="13" fill="#666">边界外首次出现"租户的系统"（Webhook 端点）——向不受控、不可靠的目标主动推送，失败语义必须设计</text>

  <!-- 人物 -->
  <g>
    <circle cx="140" cy="160" r="15" fill="#08427b"/>
    <path d="M 110 210 Q 140 176 170 210 L 170 224 L 110 224 Z" fill="#08427b"/>
    <text x="140" y="248" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">租户管理员</text>
    <text x="140" y="268" font-size="11" fill="#777" text-anchor="middle">注册开通 · 订阅 · 成员</text>
  </g>
  <g>
    <circle cx="140" cy="360" r="15" fill="#08427b"/>
    <path d="M 110 410 Q 140 376 170 410 L 170 424 L 110 424 Z" fill="#08427b"/>
    <text x="140" y="448" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">客服（坐席）</text>
    <text x="140" y="468" font-size="11" fill="#777" text-anchor="middle">处理工单 · SLA 响应</text>
  </g>
  <g>
    <circle cx="140" cy="560" r="15" fill="#08427b"/>
    <path d="M 110 610 Q 140 576 170 610 L 170 624 L 110 624 Z" fill="#08427b"/>
    <text x="140" y="648" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">终端客户</text>
    <text x="140" y="668" font-size="11" fill="#777" text-anchor="middle">表单/邮件提交问题</text>
  </g>

  <!-- 本系统 -->
  <rect x="440" y="280" width="330" height="150" rx="10" fill="#1168bd"/>
  <text x="605" y="330" font-size="17" font-weight="700" fill="#fff" text-anchor="middle">SaaS 工单系统</text>
  <text x="605" y="356" font-size="11" fill="#cfe3f7" text-anchor="middle">[软件系统 · 多租户]</text>
  <text x="605" y="382" font-size="12" fill="#cfe3f7" text-anchor="middle">租户开通 · 工单流转 · SLA</text>
  <text x="605" y="402" font-size="12" fill="#cfe3f7" text-anchor="middle">订阅计费 · Webhook</text>

  <!-- 外部 -->
  <rect x="950" y="140" width="210" height="86" rx="8" fill="#999999"/>
  <text x="1055" y="176" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">支付网关</text>
  <text x="1055" y="200" font-size="11" fill="#eee" text-anchor="middle">[外部] 微信/支付宝（适配器）</text>

  <rect x="950" y="300" width="210" height="86" rx="8" fill="#999999"/>
  <text x="1055" y="336" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">邮件服务</text>
  <text x="1055" y="360" font-size="11" fill="#eee" text-anchor="middle">[外部] 入站转工单/出站通知</text>

  <rect x="950" y="460" width="210" height="92" rx="8" fill="#999999" stroke="#e65100" stroke-width="2"/>
  <text x="1055" y="494" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">租户自己的系统</text>
  <text x="1055" y="516" font-size="11" fill="#eee" text-anchor="middle">[外部 · 不受控] Webhook 端点</text>
  <text x="1055" y="536" font-size="11" fill="#ffd9c0" text-anchor="middle">可能宕机/超时/乱序</text>

  <!-- 连线 -->
  <path d="M 185 210 L 436 310" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#s1arr)"/>
  <rect x="240" y="228" width="150" height="18" fill="#fff"/>
  <text x="315" y="242" font-size="12" fill="#555" text-anchor="middle">自助注册 · 订阅管理</text>
  <path d="M 185 380 L 436 360" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#s1arr)"/>
  <rect x="250" y="352" width="130" height="18" fill="#fff"/>
  <text x="315" y="366" font-size="12" fill="#555" text-anchor="middle">工单处理（子域名）</text>
  <path d="M 185 580 L 436 410" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#s1arr)"/>
  <rect x="245" y="480" width="140" height="18" fill="#fff"/>
  <text x="315" y="494" font-size="12" fill="#555" text-anchor="middle">表单提交 · 邮件</text>

  <path d="M 774 320 L 946 200" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#s1arr)"/>
  <rect x="782" y="240" width="156" height="18" fill="#fff"/>
  <text x="860" y="254" font-size="12" fill="#555" text-anchor="middle">收款发起 / 回调验签</text>
  <path d="M 774 350 L 946 344" fill="none" stroke="#555" stroke-width="1.6" marker-start="url(#s1arr)" marker-end="url(#s1arr)"/>
  <text x="860" y="336" font-size="12" fill="#555" text-anchor="middle">双向（入站解析/出站通知）</text>
  <path d="M 774 400 L 946 496" fill="none" stroke="#e65100" stroke-width="1.8" marker-end="url(#s1arr)"/>
  <rect x="770" y="432" width="170" height="18" fill="#fff"/>
  <text x="855" y="446" font-size="12" fill="#e65100" text-anchor="middle">Webhook：签名·重试·幂等</text>

  <!-- 图例 -->
  <g>
    <circle cx="446" cy="642" r="7" fill="#08427b"/>
    <text x="462" y="646" font-size="11" fill="#555">人物</text>
    <rect x="522" y="634" width="26" height="16" rx="4" fill="#1168bd"/>
    <text x="556" y="646" font-size="11" fill="#555">本系统</text>
    <rect x="656" y="634" width="26" height="16" rx="4" fill="#999999"/>
    <text x="690" y="646" font-size="11" fill="#555">外部系统</text>
    <rect x="788" y="634" width="26" height="16" rx="4" fill="#999999" stroke="#e65100" stroke-width="2"/>
    <text x="822" y="646" font-size="11" fill="#555">不受控的推送目标</text>
  </g>
</svg>
