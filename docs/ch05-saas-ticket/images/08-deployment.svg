<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">
  <desc>案例四云上部署图：负载均衡后 API 两实例滚动发布（示意新旧版本共存），Worker 独立伸缩，托管 PostgreSQL/Redis/对象存储；部署形态是约束表的镜像。</desc>
  <defs>
    <marker id="dp4arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#555"/>
    </marker>
  </defs>

  <text x="40" y="44" font-size="20" font-weight="700" fill="#1a1a1a">部署图：云上多实例与滚动发布（全书唯一的云部署）</text>
  <text x="40" y="70" font-size="13" fill="#666">托管服务是"复杂度预算花在业务上"的采购版（C-06 四人团队）；无状态让发布 = 逐实例替换（Q-03）</text>

  <!-- 云边界 -->
  <rect x="40" y="100" width="1120" height="460" rx="14" fill="none" stroke="#444" stroke-width="1.8" stroke-dasharray="8 5"/>
  <text x="60" y="128" font-size="13" font-weight="600" fill="#444">云 VPC</text>

  <!-- 用户 -->
  <g>
    <circle cx="105" cy="240" r="13" fill="#08427b"/>
    <path d="M 79 282 Q 105 252 131 282 L 131 294 L 79 294 Z" fill="#08427b"/>
    <text x="105" y="316" font-size="11" font-weight="600" fill="#1a1a1a" text-anchor="middle">{tenant}.example.com</text>
  </g>

  <!-- LB -->
  <rect x="190" y="220" width="130" height="80" rx="8" fill="#438dd5"/>
  <text x="255" y="252" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">负载均衡</text>
  <text x="255" y="274" font-size="10" fill="#e8f1fa" text-anchor="middle">通配符证书 · 健康检查</text>

  <!-- API 实例组 -->
  <rect x="380" y="150" width="300" height="240" rx="10" fill="#eef3f8" stroke="#8a97a3" stroke-width="1.3"/>
  <text x="396" y="176" font-size="12" font-weight="600" fill="#1a1a1a">API 实例组（无状态 · 自动伸缩）</text>
  <rect x="404" y="192" width="252" height="76" rx="8" fill="#438dd5"/>
  <text x="530" y="222" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">实例 1 · v2026.07.02</text>
  <text x="530" y="244" font-size="10" fill="#e8f1fa" text-anchor="middle">健康 · 在流量池</text>
  <rect x="404" y="284" width="252" height="76" rx="8" fill="#85bbf0"/>
  <text x="530" y="310" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">实例 2 · v2026.07.03（新）</text>
  <text x="530" y="334" font-size="10" fill="#333" text-anchor="middle">滚动发布中：健康检查通过后接流</text>

  <!-- Worker -->
  <rect x="380" y="420" width="300" height="110" rx="10" fill="#eef3f8" stroke="#8a97a3" stroke-width="1.3"/>
  <text x="396" y="446" font-size="12" font-weight="600" fill="#1a1a1a">Worker 组（按队列深度伸缩）</text>
  <rect x="404" y="458" width="252" height="56" rx="8" fill="#438dd5"/>
  <text x="530" y="482" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">Worker 1</text>
  <text x="530" y="502" font-size="10" fill="#e8f1fa" text-anchor="middle">SLA · Webhook · 邮件（平滑关闭）</text>

  <!-- 托管服务 -->
  <rect x="760" y="150" width="360" height="380" rx="10" fill="#f0f7f0" stroke="#8a97a3" stroke-width="1.3"/>
  <text x="776" y="176" font-size="12" font-weight="600" fill="#1a1a1a">托管服务（高可用/备份/补丁外包给云厂商）</text>
  <g>
    <ellipse cx="870" cy="216" rx="75" ry="10" fill="#438dd5"/>
    <rect x="795" y="216" width="150" height="54" fill="#438dd5"/>
    <ellipse cx="870" cy="270" rx="75" ry="10" fill="#438dd5"/>
    <text x="870" y="242" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">PostgreSQL</text>
    <text x="870" y="262" font-size="9" fill="#e8f1fa" text-anchor="middle">RLS · 自动备份 · 主备</text>
  </g>
  <g>
    <ellipse cx="1030" cy="216" rx="65" ry="10" fill="#438dd5"/>
    <rect x="965" y="216" width="130" height="54" fill="#438dd5"/>
    <ellipse cx="1030" cy="270" rx="65" ry="10" fill="#438dd5"/>
    <text x="1030" y="242" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">Redis</text>
    <text x="1030" y="262" font-size="9" fill="#e8f1fa" text-anchor="middle">BullMQ 队列</text>
  </g>
  <rect x="795" y="320" width="300" height="60" rx="8" fill="#438dd5"/>
  <text x="945" y="346" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">对象存储</text>
  <text x="945" y="366" font-size="9" fill="#e8f1fa" text-anchor="middle">附件（键含 tenant 前缀）</text>
  <rect x="795" y="410" width="300" height="96" rx="8" fill="#fdf6ec" stroke="#d9c8a9" stroke-width="1"/>
  <text x="811" y="436" font-size="11" font-weight="600" fill="#1a1a1a">四张部署图对照（第 6 章）：</text>
  <text x="811" y="458" font-size="10.5" fill="#555">政务=机房双机热备 · 企业=机房单节点</text>
  <text x="811" y="478" font-size="10.5" fill="#555">工厂=车间边缘+物理机 · SaaS=云上弹性</text>
  <text x="811" y="498" font-size="10.5" fill="#e65100">部署形态是约束表的镜像</text>

  <!-- 连线 -->
  <line x1="137" y1="260" x2="186" y2="260" stroke="#555" stroke-width="1.6" marker-end="url(#dp4arr)"/>
  <line x1="320" y1="240" x2="400" y2="226" stroke="#555" stroke-width="1.6" marker-end="url(#dp4arr)"/>
  <line x1="320" y1="280" x2="400" y2="316" stroke="#555" stroke-width="1.6" marker-end="url(#dp4arr)"/>
  <path d="M 680 250 L 792 240" fill="none" stroke="#555" stroke-width="1.4" marker-end="url(#dp4arr)"/>
  <text x="732" y="232" font-size="10" fill="#555" text-anchor="middle">SQL</text>
  <path d="M 680 300 L 962 260" fill="none" stroke="#555" stroke-width="1.4" marker-end="url(#dp4arr)"/>
  <text x="800" y="292" font-size="10" fill="#555" text-anchor="middle">投递任务</text>
  <path d="M 680 470 L 962 276" fill="none" stroke="#555" stroke-width="1.4" marker-end="url(#dp4arr)"/>
  <text x="836" y="392" font-size="10" fill="#555" text-anchor="middle">竞争消费</text>
  <path d="M 680 500 L 792 350" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#dp4arr)"/>

  <!-- 图例 -->
  <g>
    <rect x="500" y="588" width="24" height="15" rx="4" fill="#438dd5"/>
    <text x="532" y="600" font-size="11" fill="#555">运行实例</text>
    <rect x="628" y="588" width="24" height="15" rx="4" fill="#85bbf0"/>
    <text x="660" y="600" font-size="11" fill="#555">发布中的新版本</text>
    <rect x="790" y="588" width="24" height="15" rx="4" fill="#f0f7f0" stroke="#8a97a3" stroke-width="1"/>
    <text x="822" y="600" font-size="11" fill="#555">托管服务区</text>
    <rect x="930" y="588" width="24" height="15" rx="4" fill="none" stroke="#444" stroke-width="1.5" stroke-dasharray="8 5"/>
    <text x="962" y="600" font-size="11" fill="#555">VPC 边界</text>
  </g>
</svg>
