<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" font-family="PingFang SC,Microsoft YaHei,sans-serif">
  <defs>
    <linearGradient id="dbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a0e14"/><stop offset="1" stop-color="#0d1220"/></linearGradient>
    <linearGradient id="dac" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#38bdf8"/></linearGradient>
    <pattern id="dgrid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0H0V30" fill="none" stroke="#16202e" stroke-width="1"/></pattern>
    <filter id="dsh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#000" flood-opacity="0.35"/></filter>
  </defs>
  <rect width="760" height="440" fill="url(#dbg)"/><rect width="760" height="440" fill="url(#dgrid)" opacity="0.35"/>
  <rect x="0" y="0" width="760" height="44" fill="#121826" opacity="0.5"/>
  <rect x="24" y="13" width="4" height="19" rx="2" fill="url(#dac)"/>
  <text x="36" y="28" font-size="15" font-weight="750" fill="#e6edf6">§6 · Loop 上线分级 L0→L3（把 Loop 当交付管）</text>
<line x1="370.0" y1="320.0" x2="390.0" y2="308.0" stroke="#38bdf8" stroke-width="1.6" /><path d="M390 308 L386.2 314.5 L382.5 308.3 z" fill="#38bdf8"/><rect x="368.4" y="306" width="23.2" height="15" rx="4" fill="#0d1220" stroke="#1e2a3a"/><text x="380" y="317" font-size="9" fill="#9fb0c3" text-anchor="middle">升级</text>
<line x1="390.0" y1="246.0" x2="410.0" y2="234.0" stroke="#38bdf8" stroke-width="1.6" /><path d="M410 234 L406.2 240.5 L402.5 234.3 z" fill="#38bdf8"/><rect x="388.4" y="232" width="23.2" height="15" rx="4" fill="#0d1220" stroke="#1e2a3a"/><text x="400" y="243" font-size="9" fill="#9fb0c3" text-anchor="middle">升级</text>
<line x1="410.0" y1="172.0" x2="430.0" y2="160.0" stroke="#38bdf8" stroke-width="1.6" /><path d="M430 160 L426.2 166.5 L422.5 160.3 z" fill="#38bdf8"/><rect x="408.4" y="158" width="23.2" height="15" rx="4" fill="#0d1220" stroke="#1e2a3a"/><text x="420" y="169" font-size="9" fill="#9fb0c3" text-anchor="middle">升级</text>
<rect x="90" y="320" width="560" height="62" rx="10" fill="#121826" stroke="#5b6b7f" stroke-width="1.4"  filter="url(#dsh)"/>
  <rect x="90" y="320" width="560" height="3" rx="1.5" fill="#5b6b7f"/>
  <text x="370" y="350" font-size="12" font-weight="700" fill="#e6edf6" text-anchor="middle">L0 草稿</text><text x="370" y="365" font-size="9.5" fill="#5b6b7f" text-anchor="middle">退出：确认它到底该干什么</text>
<rect x="110" y="246" width="560" height="62" rx="10" fill="#121826" stroke="#38bdf8" stroke-width="1.4"  filter="url(#dsh)"/>
  <rect x="110" y="246" width="560" height="3" rx="1.5" fill="#38bdf8"/>
  <text x="390" y="276" font-size="12" font-weight="700" fill="#e6edf6" text-anchor="middle">L1 只报告</text><text x="390" y="291" font-size="9.5" fill="#5b6b7f" text-anchor="middle">退出：误报可接受、判断与我一致（≥1 周）</text>
<rect x="130" y="172" width="560" height="62" rx="10" fill="#121826" stroke="#22d3ee" stroke-width="1.4"  filter="url(#dsh)"/>
  <rect x="130" y="172" width="560" height="3" rx="1.5" fill="#22d3ee"/>
  <text x="410" y="202" font-size="12" font-weight="700" fill="#e6edf6" text-anchor="middle">L2 辅助</text><text x="410" y="217" font-size="9.5" fill="#5b6b7f" text-anchor="middle">退出：连续 N 次对、我敢闭眼点同意</text>
<rect x="150" y="98" width="560" height="62" rx="10" fill="#121826" stroke="#34d399" stroke-width="1.4"  filter="url(#dsh)"/>
  <rect x="150" y="98" width="560" height="3" rx="1.5" fill="#34d399"/>
  <text x="430" y="128" font-size="12" font-weight="700" fill="#e6edf6" text-anchor="middle">L3 无人值守</text><text x="430" y="143" font-size="9.5" fill="#5b6b7f" text-anchor="middle">护栏：白名单+成本上限+急停+独立验收+日志</text>
<text x="24" y="426" font-size="10.5" fill="#5b6b7f">像自动驾驶分级放权，每级有明确「毕业考」才升级——拒绝跳级，跳级上线是事故温床。</text>
</svg>